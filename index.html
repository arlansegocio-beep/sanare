<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANARE ULTRA | Premium Medical Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: '#09090B' }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; background-color: #09090B; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel {
            background: rgba(18, 18, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
        }
        .active-tab { background: #FFFFFF; color: #09090B; }
    </style>
</head>
<body class="dark bg-slate-950 text-slate-50 font-sans min-h-screen relative overflow-x-hidden">

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = "https://cvzwkifoexnjbtuvwxjr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__VapXVAabPKcv6lXJ8Agag_1nxbP4ay";
        const coreClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [currentPage, setCurrentPage] = useState("auth"); 
            const [currentTab, setCurrentTab] = useState("dashboard"); 
            const [authError, setAuthError] = useState("");
            const [isVerifying, setIsVerifying] = useState(false);
            
            // Connected React Live Database Arrays
            const [announcement, setAnnouncement] = useState(null);
            const [weeklySchedule, setWeeklySchedule] = useState([]);
            const [books, setBooks] = useState([]);
            const [academicResources, setAcademicResources] = useState([]);
            const [batchFolders, setBatchFolders] = useState([]);
            const [configMap, setConfigMap] = useState({});

            // Dynamic Sub-filters for Notes/Sud_An tabs
            const [selectedBatch, setSelectedBatch] = useState("Sanare");
            const [selectedSemester, setSelectedSemester] = useState("1st Semester");

            useEffect(() => {
                const { data: { subscription } } = coreClient.auth.onAuthStateChange(async (event, session) => {
                    if (session) {
                        setIsVerifying(true);
                        const loggedInEmail = session.user?.email;

                        const { data: whitelistCheck, error: whitelistError } = await coreClient
                            .from('allowed_emails')
                            .select('email')
                            .eq('email', loggedInEmail);

                        if (whitelistError || !whitelistCheck || whitelistCheck.length === 0) {
                            setAuthError("Access Denied: Your Gmail account is not whitelisted.");
                            setIsVerifying(false);
                            setCurrentPage("auth");
                            await coreClient.auth.signOut();
                            return;
                        }

                        setAuthError("");
                        setIsVerifying(false);
                        setCurrentPage("dashboard");
                        
                        // Execute parallel sheet data streams
                        fetchConfig();
                        fetchAnnouncements();
                        fetchTimetable();
                        fetchBooks();
                        fetchAcademicResources();
                        fetchBatchFolders();
                    } else {
                        setCurrentPage("auth");
                    }
                });
                return () => subscription.unsubscribe();
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // --- DATABASE SYNC LAYERS ---
            async function fetchConfig() {
                const { data } = await coreClient.from('system_config').select('*');
                if (data) {
                    const mapped = {};
                    data.forEach(item => mapped[item.key] = item.value);
                    setConfigMap(mapped);
                }
            }

            async function fetchAnnouncements() {
                const { data } = await coreClient.from('announcements').select('*').order('date_posted', { ascending: false }).limit(1);
                if (data && data.length > 0) setAnnouncement(data[0]);
            }

            async function fetchTimetable() {
                const { data } = await coreClient.from('weekly_schedule').select('*').order('day_of_week', { ascending: true });
                if (data) setWeeklySchedule(data);
            }

            async function fetchBooks() {
                const { data } = await coreClient.from('medical_books').select('*').order('book_name', { ascending: true });
                if (data) setBooks(data);
            }

            async function fetchAcademicResources() {
                const { data } = await coreClient.from('academic_resources').select('*').order('topic', { ascending: true });
                if (data) setAcademicResources(data);
            }

            async function fetchBatchFolders() {
                const { data } = await coreClient.from('batch_folders').select('*').order('topic', { ascending: true });
                if (data) setBatchFolders(data);
            }

            // --- DRIVE STREAM PARSERS ---
            const resolveDriveLinks = (rawUrl) => {
                if (!rawUrl) return { preview: '#', download: '#' };
                const str = String(rawUrl).trim();
                let fileId = '';
                if (str.includes('/d/')) { fileId = str.split('/d/')[1].split('/')[0]; }
                else if (str.includes('id=')) { fileId = str.split('id=')[1].split('&')[0]; }

                if (fileId) {
                    if (str.includes('docs.google.com/document')) {
                        return { preview: `https://docs.google.com/document/d/${fileId}/preview`, download: `https://docs.google.com/document/d/${fileId}/export?format=pdf` };
                    }
                    return { preview: `https://drive.google.com/file/d/${fileId}/preview`, download: `https://drive.google.com/uc?export=download&id=${fileId}` };
                }
                return { preview: str, download: str };
            };

            // --- BLOCK GROUPING MATHEMATICS ---
            const getGroupedBlockData = (list, resourceType) => {
                const filtered = list.filter(item => item.resource_type === resourceType && item.batch === selectedBatch && item.semester === selectedSemester);
                const grouped = {};
                filtered.forEach(item => {
                    let parentGroup = item.block;
                    const numMatch = String(item.block).match(/Block\s+(\d+)/i);
                    if (numMatch) { parentGroup = `Block ${numMatch[1]}`; }
                    if (!grouped[parentGroup]) grouped[parentGroup] = [];
                    grouped[parentGroup].push(item);
                });
                return grouped;
            };

            const daysNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
            const currentDayInt = new Date().getDay() === 0 ? 7 : new Date().getDay();

            return (
                <div class="min-h-screen flex flex-col justify-between">
                    {currentPage === "auth" && (
                        <div class="flex-1 flex items-center justify-center px-4 relative z-10">
                            <div class="max-w-md w-full bg-slate-900 border border-white/5 rounded-3xl p-8 text-center space-y-6 glass-panel">
                                <div class="mx-auto w-16 h-16 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-2xl border border-blue-500/30 flex items-center justify-center">
                                    <i data-lucide="shield-check" class="w-8 h-8 text-blue-400"></i>
                                </div>
                                <div class="space-y-2">
                                    <h2 class="text-2xl font-bold tracking-tight text-white">Sanare Command Hub</h2>
                                    <p class="text-sm text-slate-400">Private Academic Terminal. Access restricted strictly to authorized credentials.</p>
                                </div>
                                <button onClick={async () => { setAuthError(""); const { error } = await coreClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } }); if (error) setAuthError(error.message); }} disabled={isVerifying} class="w-full py-3.5 px-4 bg-white text-slate-950 font-semibold rounded-xl hover:bg-slate-200 transition-all flex items-center justify-center space-x-3">
                                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285f4"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34a853"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22l.81-.63z" fill="#fbbc05"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1C7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#ea4335"/></svg>
                                    <span>Authorize with Gmail</span>
                                </button>
                                {authError && <div class="text-xs text-rose-400 bg-rose-500/10 border border-rose-500/20 py-2 px-3 rounded-xl">{authError}</div>}
                            </div>
                        </div>
                    )}

                    {currentPage === "dashboard" && (
                        <div class="flex-1 flex flex-col md:flex-row h-screen overflow-hidden">
                            <aside class="hidden md:flex w-64 h-full bg-slate-950 border-r border-white/5 flex-col shrink-0">
                                <div class="h-16 flex items-center px-6 border-b border-white/5">
                                    <span class="font-extrabold tracking-tighter text-sm text-white">⚕️ {configMap.welcome_title || 'SANARE ULTRA'}</span>
                                </div>
                                <nav class="flex-1 p-4 space-y-1 overflow-y-auto no-scrollbar text-left">
                                    <div class="px-3 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Portal</div>
                                    <button onClick={() => setCurrentTab("dashboard")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition ${currentTab === "dashboard" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard Overview</button>
                                    
                                    <div class="px-3 mb-2 mt-5 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Vault Tiers</div>
                                    <button onClick={() => setCurrentTab("books")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition ${currentTab === "books" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}><i data-lucide="book-open" class="w-4 h-4"></i> Medical Books Matrix</button>
                                    <button onClick={() => setCurrentTab("Note")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition ${currentTab === "Note" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}><i data-lucide="file-text" class="w-4 h-4"></i> Lecture Notes Archive</button>
                                    <button onClick={() => setCurrentTab("Sud_An")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition ${currentTab === "Sud_An" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}><i data-lucide="folder-open" class="w-4 h-4"></i> Sud An Recalls</button>
                                    <button onClick={() => setCurrentTab("Fresh_Sud_An")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition ${currentTab === "Fresh_Sud_An" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}><i data-lucide="sparkles" class="w-4 h-4"></i> Fresh Sud An</button>
                                    <button onClick={() => setCurrentTab("Questionnaire")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition ${currentTab === "Questionnaire" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}><i data-lucide="help-circle" class="w-4 h-4"></i> Questionnaires</button>
                                    <button onClick={() => setCurrentTab("folders")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition ${currentTab === "folders" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}><i data-lucide="folder-git" class="w-4 h-4"></i> Batch Root Folders</button>
                                    <button onClick={() => setCurrentTab("calendar")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition ${currentTab === "calendar" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}><i data-lucide="calendar" class="w-4 h-4"></i> Rotations Calendar</button>
                                </nav>
                                <div class="p-4 border-t border-white/5 space-y-2">
                                    <button onClick={async () => { await coreClient.auth.signOut(); window.location.reload(); }} class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-rose-950/20 text-xs font-bold text-rose-400 transition"><span>Disconnect Terminal</span><i data-lucide="log-out" class="w-4 h-4"></i></button>
                                </div>
                            </aside>

                            <main class="flex-1 flex flex-col h-full bg-slate-950 overflow-y-auto no-scrollbar pb-16 md:pb-0">
                                <header class="h-16 border-b border-white/5 px-6 flex items-center justify-between shrink-0 backdrop-blur-md sticky top-0 z-50 bg-slate-950/80">
                                    <div class="flex items-center gap-2">
                                        <span class="text-xs font-extrabold text-white uppercase tracking-wider">{currentTab} Core Node</span>
                                    </div>
                                    {["Note", "Sud_An", "Fresh_Sud_An", "Questionnaire"].includes(currentTab) && (
                                        <div class="flex gap-2 bg-slate-900 p-1 border border-white/5 rounded-xl text-[11px] font-bold">
                                            {["Sanare", "Manus", "Vesties"].map(b => (
                                                <button key={b} onClick={() => setSelectedBatch(b)} class={`px-2.5 py-1 rounded-md transition ${selectedBatch === b ? "bg-white text-black" : "text-slate-400 hover:text-white"}`}>{b}</button>
                                            ))}
                                            <span class="text-slate-700 self-center">|</span>
                                            {["1st Semester", "2nd Semester"].map(s => (
                                                <button key={s} onClick={() => setSelectedSemester(s)} class={`px-2.5 py-1 rounded-md transition ${selectedSemester === s ? "bg-white text-black" : "text-slate-400 hover:text-white"}`}>{s === "1st Semester" ? "Sem 1" : "Sem 2"}</button>
                                            ))}
                                        </div>
                                    )}
                                </header>

                                <div class="flex-1 p-6 md:p-8 space-y-6 max-w-7xl w-full mx-auto">
                                    
                                    {/* CORE LANDING DISPLAY VIEW */}
                                    {currentTab === "dashboard" && (
                                        <div class="space-y-6 text-left">
                                            {announcement && (
                                                <div class="glass-panel p-5 border-l-4 border-l-blue-500 shadow-xl">
                                                    <div class="flex items-start space-x-4">
                                                        <div class="p-2 bg-blue-500/10 rounded-xl text-blue-400 mt-0.5"><i data-lucide="megaphone" class="w-5 h-5"></i></div>
                                                        <div class="flex-1 space-y-1">
                                                            <div class="flex justify-between items-center">
                                                                <h3 class="font-bold text-base text-white">Latest Bulletin Notice</h3>
                                                                <span class="text-[10px] text-slate-500 font-mono font-bold">{announcement.date_posted}</span>
                                                            </div>
                                                            <p class="text-sm text-slate-300 leading-relaxed">{announcement.announcement_text}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            <div class="glass-panel p-6 shadow-xl space-y-4">
                                                <div class="flex items-center space-x-2.5 border-b border-white/5 pb-3">
                                                    <i data-lucide="calendar-days" class="w-5 h-5 text-purple-400"></i>
                                                    <h2 class="font-semibold text-lg text-white tracking-tight">Weekly Timetable Schedule</h2>
                                                </div>
                                                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
                                                    {daysNames.map((day, idx) => {
                                                        const i = idx + 1;
                                                        const dayEvents = weeklySchedule.filter(item => item.day_of_week === i);
                                                        return (
                                                            <div key={day} class={`glass-panel rounded-xl p-3 border ${i === currentDayInt ? 'bg-blue-500/10 border-blue-500/40 ring-1 ring-blue-500/30' : 'bg-slate-950/40 border-white/5'} flex flex-col min-h-[140px]`}>
                                                                <h4 class={`text-xs uppercase tracking-wider ${i === currentDayInt ? 'text-blue-400 font-bold' : 'text-slate-400 font-medium'}`}>{day}</h4>
                                                                {dayEvents.length === 0 ? (
                                                                    <p class="text-[11px] text-slate-600 italic pt-2">Clear Schedule</p>
                                                                ) : dayEvents.map((ev, eIdx) => (
                                                                    <div key={eIdx} class="border-t border-white/5 mt-1.5 pt-1.5 space-y-0.5">
                                                                        <p class="text-[11px] font-semibold text-slate-200 line-clamp-2">{ev.event_title}</p>
                                                                        <p class="text-[9px] text-slate-500 font-mono">{ev.event_date}</p>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* MODULE: MEDICAL BOOKS VIEW */}
                                    {currentTab === "books" && (
                                        <div class="space-y-6 text-left">
                                            {configMap.books_master_drive && (
                                                <a href={configMap.books_master_drive} target="_blank" class="p-4 rounded-xl border border-dashed border-white/10 flex items-center justify-between text-xs hover:border-blue-500/30 transition group">
                                                    <div class="flex items-center gap-2"><i data-lucide="folder" class="text-amber-400 w-4 h-4"></i> <span class="text-slate-300 font-semibold">Access Entire Books Master Drive Directory</span></div>
                                                    <i data-lucide="arrow-right" class="w-4 h-4 text-slate-500 group-hover:translate-x-1 transition-transform"></i>
                                                </a>
                                            )}
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {books.length === 0 ? <div class="col-span-full text-center text-xs text-slate-500 italic py-8">No books logged.</div> : books.map((b, idx) => {
                                                    const routes = resolveDriveLinks(b.drive_link);
                                                    return (
                                                        <div key={idx} class="bg-slate-950/30 border border-white/5 rounded-xl p-4 flex items-center justify-between hover:border-white/10 transition-all">
                                                            <div class="space-y-1 max-w-[75%]">
                                                                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">{b.subject}</span>
                                                                <h4 class="text-sm font-semibold text-slate-200 truncate">{b.book_name}</h4>
                                                            </div>
                                                            <div class="flex items-center space-x-2 shrink-0">
                                                                <a href={routes.preview} target="_blank" class="p-2 bg-white/5 hover:bg-blue-500/20 text-slate-300 hover:text-blue-400 rounded-lg border border-white/5 transition-all"><i data-lucide="eye" class="w-4 h-4"></i></a>
                                                                <a href={routes.download} target="_blank" class="p-2 bg-white/5 hover:bg-emerald-500/20 text-slate-300 hover:text-emerald-400 rounded-lg border border-white/5 transition-all"><i data-lucide="download" class="w-4 h-4"></i></a>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {/* MODULES: NOTES, SUD_AN, FRESH, QUESTIONNAIRES */}
                                    {["Note", "Sud_An", "Fresh_Sud_An", "Questionnaire"].includes(currentTab) && (
                                        <div class="space-y-6 text-left">
                                            {Object.keys(getGroupedBlockData(academicResources, currentTab)).length === 0 ? (
                                                <div class="text-center text-xs text-slate-500 italic py-12 border border-dashed border-white/5 rounded-2xl">No asset structures registered under current {selectedBatch} / {selectedSemester} filter paths.</div>
                                            ) : Object.entries(getGroupedBlockData(academicResources, currentTab)).map(([blockName, items]) => (
                                                <div key={blockName} class="space-y-3">
                                                    <h3 class="text-xs font-extrabold text-slate-400 uppercase tracking-widest pl-1">{blockName}</h3>
                                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        {items.map((item, idx) => {
                                                            const routes = resolveDriveLinks(item.file_link);
                                                            return (
                                                                <div key={idx} class="bg-slate-950/30 border border-white/5 rounded-xl p-4 flex items-center justify-between hover:border-white/10 transition-all">
                                                                    <div class="space-y-1 max-w-[75%]">
                                                                        <div class="flex items-center gap-2">
                                                                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">{item.subject}</span>
                                                                            <span class="text-[9px] px-1.5 py-0.2 bg-white/5 text-slate-400 border border-white/5 rounded">{item.block}</span>
                                                                        </div>
                                                                        <h4 class="text-sm font-semibold text-slate-200 truncate">{item.topic}</h4>
                                                                    </div>
                                                                    <div class="flex items-center space-x-2 shrink-0">
                                                                        <a href={routes.preview} target="_blank" class="p-2 bg-white/5 hover:bg-blue-500/20 text-slate-300 hover:text-blue-400 rounded-lg border border-white/5 transition-all"><i data-lucide="eye" class="w-4 h-4"></i></a>
                                                                        <a href={routes.download} target="_blank" class="p-2 bg-white/5 hover:bg-emerald-500/20 text-slate-300 hover:text-emerald-400 rounded-lg border border-white/5 transition-all"><i data-lucide="download" class="w-4 h-4"></i></a>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* MODULE: BATCH DIRECTORY ROOT FOLDERS */}
                                    {currentTab === "folders" && (
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
                                            {batchFolders.length === 0 ? <div class="col-span-full text-center text-xs text-slate-500 italic py-8">No folder connections loaded.</div> : batchFolders.map((f, idx) => (
                                                <a key={idx} href={f.folder_link} target="_blank" class="p-4 bg-slate-900/40 border border-white/5 hover:border-white/10 rounded-xl flex items-center justify-between group transition">
                                                    <div class="space-y-1 max-w-[85%]">
                                                        <div class="flex items-center gap-2 text-[9px] font-bold tracking-wider uppercase text-slate-500">
                                                            <span>{f.batch}</span><span>•</span><span>{f.semester}</span><span>•</span><span>{f.category}</span>
                                                        </div>
                                                        <h4 class="text-sm font-semibold text-slate-200 truncate group-hover:text-blue-400 transition-colors">{f.topic}</h4>
                                                        <p class="text-xs text-slate-400 truncate">{f.subject}</p>
                                                    </div>
                                                    <i data-lucide="folder-symlink" class="w-5 h-5 text-slate-600 group-hover:text-blue-400 transition"></i>
                                                </a>
                                            ))}
                                        </div>
                                    )}

                                    {/* MODULE: ACTIVE ROTATIONS CALENDAR EMBED */}
                                    {currentTab === "calendar" && (
                                        <div class="space-y-4 text-left h-full flex flex-col">
                                            <div class="bg-slate-900 border border-white/5 p-2 rounded-2xl h-[65vh] min-h-[450px] flex-1">
                                                <iframe src={configMap.calendar_embed_url || "https://calendar.google.com/calendar/embed?src=en.philippines%23holiday%40group.v.calendar.google.com"} 
                                                        style={{border: 0, borderRadius: "0.75rem"}} class="w-full h-full opacity-75 invert contrast-125" frameborder="0" scrolling="no"></iframe>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            </main>

                            {/* Mobile Dock Control Strip */}
                            <nav class="md:hidden fixed bottom-0 left-0 w-full h-16 bg-slate-950/80 backdrop-blur-md border-t border-white/5 z-40 px-1 flex justify-around items-center">
                                <button onClick={() => setCurrentTab("dashboard")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "dashboard" ? "text-white" : "text-slate-500"}`}><i data-lucide="layout-dashboard" class="w-4 h-4 mb-0.5"></i><span class="text-[9px] font-bold">Overview</span></button>
                                <button onClick={() => setCurrentTab("books")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "books" ? "text-white" : "text-slate-500"}`}><i data-lucide="book-open" class="w-4 h-4 mb-0.5"></i><span class="text-[9px] font-bold">Books</span></button>
                                <button onClick={() => setCurrentTab("Note")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "Note" ? "text-white" : "text-slate-500"}`}><i data-lucide="file-text" class="w-4 h-4 mb-0.5"></i><span class="text-[9px] font-bold">Notes</span></button>
                                <button onClick={() => setCurrentTab("Sud_An")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "Sud_An" ? "text-white" : "text-slate-500"}`}><i data-lucide="folder-open" class="w-4 h-4 mb-0.5"></i><span class="text-[9px] font-bold">Recalls</span></button>
                                <button onClick={() => setCurrentTab("folders")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "folders" ? "text-white" : "text-slate-500"}`}><i data-lucide="folder-git" class="w-4 h-4 mb-0.5"></i><span class="text-[9px] font-bold">Roots</span></button>
                            </nav>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
