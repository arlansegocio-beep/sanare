<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANARE ULTRA | Premium Medical Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght=0,600;1,400&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif']
                    },
                    colors: {
                        brand: '#09090B',
                        slate: {
                            50: '#FAFAFA',
                            100: '#F4F4F5',
                            200: '#E4E4E7',
                            300: '#D4D4D8',
                            400: '#A1A1AA',
                            500: '#71717A',
                            600: '#52525B',
                            700: '#3F3F46',
                            800: '#27272A',
                            900: '#18181B',
                            950: '#09090B',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; background-color: #09090B; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-panel {
            background: rgba(18, 18, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            border-radius: 1.25rem;
        }
        
        .premium-card { transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s; }
        .premium-card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px -10px rgba(0,0,0,0.5); }
        
        .active-tab {
            background: #FFFFFF;
            color: #09090B;
        }
    </style>
</head>
<body class="dark bg-slate-950 text-slate-50 font-sans min-h-screen transition-colors duration-300 relative overflow-x-hidden">

    <!-- Ambient Glow Decorative Background Graphics -->
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-sky-600/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-indigo-600/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>

    <div id="root"></div>

    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Execution Script Core Engine -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Secure Backend Supabase Initializer Setup
        const SUPABASE_URL = "https://cvzwkifoexnjbtuvwxjr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__VapXVAabPKcv6lXJ8Agag_1nxbP4ay";
        const coreClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [currentPage, setCurrentPage] = useState("auth"); // auth, dashboard
            const [currentTab, setCurrentTab] = useState("dashboard"); // dashboard, vault, quizzes, treasury, planner, calendar
            const [authError, setAuthError] = useState("");
            const [isVerifying, setIsVerifying] = useState(false);
            
            // Connected React Live Database Streams
            const [announcement, setAnnouncement] = useState(null);
            const [weeklySchedule, setWeeklySchedule] = useState([]);
            const [vaultCache, setVaultCache] = useState([]);
            const [vaultCategory, setVaultCategory] = useState("Book");
            const [quizzes, setQuizzes] = useState([]);
            const [ledger, setLedger] = useState([]);
            const [netBalance, setNetBalance] = useState(0);

            // Client Local Task Management State
            const [tasks, setTasks] = useState(() => {
                const stored = localStorage.getItem("sanare-tasks");
                return stored ? JSON.parse(stored) : [];
            });
            const [taskModalOpen, setTaskModalOpen] = useState(false);
            const [newTask, setNewTask] = useState({ text: "", priority: "Medium", dueDate: "", subject: "" });

            // Core Security State Observer Handshake
            useEffect(() => {
                const { data: { subscription } } = coreClient.auth.onAuthStateChange(async (event, session) => {
                    if (session) {
                        setIsVerifying(true);
                        const loggedInEmail = session.user?.email;

                        const { data: whitelistCheck, error: whitelistError } = await coreClient
                            .from('allowed_emails')
                            .select('email')
                            .eq('email', loggedInEmail);

                        if (whitelistError || !whitelistCheck || whitelistCheck.length === 0) {
                            setAuthError("Access Denied: Your Gmail account is not whitelisted on the Sanare ledger.");
                            setIsVerifying(false);
                            setCurrentPage("auth");
                            await coreClient.auth.signOut();
                            return;
                        }

                        setAuthError("");
                        setIsVerifying(false);
                        setCurrentPage("dashboard");
                        
                        // Fire Data Ingestion Streams
                        fetchAnnouncements();
                        fetchTimetable();
                        fetchVault();
                        fetchQuizzes();
                        fetchLedger();
                    } else {
                        setCurrentPage("auth");
                    }
                });

                return () => subscription.unsubscribe();
            }, []);

            useEffect(() => {
                localStorage.setItem("sanare-tasks", JSON.stringify(tasks));
            }, [tasks]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            // --- DATABASE FETCH MODULES ---
            async function fetchAnnouncements() {
                const { data, error } = await coreClient.from('announcements').select('*').order('created_at', { ascending: false }).limit(1);
                if (!error && data && data.length > 0) setAnnouncement(data[0]);
            }

            async function fetchTimetable() {
                const { data, error } = await coreClient.from('weekly_schedule').select('*').order('day_of_week', { ascending: true });
                if (!error && data) setWeeklySchedule(data);
            }

            async function fetchVault() {
                const { data, error } = await coreClient.from('document_vault').select('*').order('title', { ascending: true });
                if (!error && data) setVaultCache(data);
            }

            async function fetchQuizzes() {
                const { data, error } = await coreClient.from('quiz_directory').select('*').order('created_at', { ascending: false });
                if (!error && data) setQuizzes(data);
            }

            async function fetchLedger() {
                const { data, error } = await coreClient.from('financial_ledger').select('*').order('transaction_date', { ascending: false });
                if (!error && data) {
                    setLedger(data);
                    const total = data.reduce((sum, item) => sum + parseFloat(item.amount), 0);
                    setNetBalance(total);
                }
            }

            // --- INTERACTIVE ACTIONS ---
            const handleGoogleLogin = async () => {
                setAuthError("");
                const { error } = await coreClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.origin + window.location.pathname }
                });
                if (error) setAuthError(error.message);
            };

            const handleLogout = async () => {
                await coreClient.auth.signOut();
                window.location.reload();
            };

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newTask.text) return;
                const taskObj = {
                    id: "task-" + Date.now(),
                    text: newTask.text,
                    priority: newTask.priority,
                    status: "Todo",
                    dueDate: newTask.dueDate || new Date().toISOString().split('T')[0],
                    subject: newTask.subject || "General"
                };
                setTasks(prev => [taskObj, ...prev]);
                setNewTask({ text: "", priority: "Medium", dueDate: "", subject: "" });
                setTaskModalOpen(false);
            };

            // --- HELPERS ---
            const getSubjectIcon = (subj) => {
                if(!subj) return '📘';
                let s = String(subj).toLowerCase();
                if(s.includes('pharma')) return '💊';
                if(s.includes('anato')) return 'Bone';
                if(s.includes('pedia')) return '👶';
                if(s.includes('patho')) return '🔬';
                if(s.includes('physio')) return '🫀';
                if(s.includes('neuro') || s.includes('psych')) return '🧠';
                return '📘';
            };

            const getCleanPreviewUrl = (url) => {
                if (!url) return '#';
                return url.includes("drive.google.com") && url.includes("/view") ? url.replace("/view", "/preview") : url;
            };

            const getDownloadLink = (url) => {
                if(!url) return '#';
                let str = String(url).trim();
                if (str.includes('docs.google.com/document/d/')) {
                    let id = str.split('document/d/')[1].split('/')[0];
                    return `https://docs.google.com/document/d/${id}/export?format=pdf`;
                }
                return str;
            };

            const daysNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
            const currentDayInt = new Date().getDay() === 0 ? 7 : new Date().getDay();

            return (
                <div class="min-h-screen flex flex-col justify-between">
                    
                    {/* SECURE IDENTITY PORT GATEWAY */}
                    {currentPage === "auth" && (
                        <div class="flex-1 flex items-center justify-center px-4 relative z-10">
                            <div class="max-w-md w-full bg-slate-900 border border-white/5 rounded-3xl p-8 shadow-2xl shadow-blue-500/5 text-center space-y-6 glass-panel">
                                <div class="mx-auto w-16 h-16 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-2xl border border-blue-500/30 flex items-center justify-center">
                                    <i data-lucide="shield-check" class="w-8 h-8 text-blue-400"></i>
                                </div>
                                <div class="space-y-2">
                                    <h2 class="text-2xl font-bold tracking-tight text-white">Sanare Command Hub</h2>
                                    <p class="text-sm text-slate-400">Private Academic Terminal. Access restricted strictly to authorized medical class credentials.</p>
                                </div>
                                <button onClick={handleGoogleLogin} disabled={isVerifying} class="w-full py-3.5 px-4 bg-white text-slate-950 font-semibold rounded-xl hover:bg-slate-200 transition-all flex items-center justify-center space-x-3">
                                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285f4"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34a853"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22l.81-.63z" fill="#fbbc05"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1C7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#ea4335"/></svg>
                                    <span>Authorize with Gmail</span>
                                </button>
                                {authError && <div class="text-xs text-rose-400 bg-rose-500/10 border border-rose-500/20 py-2 px-3 rounded-xl">{authError}</div>}
                            </div>
                        </div>
                    )}

                    {/* OPERATIONAL MANAGEMENT MATRIX */}
                    {currentPage === "dashboard" && (
                        <div class="flex-1 flex flex-col md:flex-row h-screen overflow-hidden">
                            
                            {/* Desktop Left Control Ribbon */}
                            <aside class="hidden md:flex w-64 h-full bg-slate-950 border-r border-white/5 flex-col shrink-0">
                                <div class="h-16 flex items-center px-6 border-b border-white/5 justify-between">
                                    <div class="flex items-center gap-2">
                                        <div class="w-7 h-7 rounded bg-white flex items-center justify-center text-black font-extrabold text-sm">⚕️</div>
                                        <span class="font-extrabold tracking-tighter text-sm text-white">SANARE ULTRA</span>
                                    </div>
                                </div>
                                <nav class="flex-1 p-4 space-y-1 overflow-y-auto no-scrollbar">
                                    <div class="px-3 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Core</div>
                                    <button onClick={() => setCurrentTab("dashboard")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left font-bold text-xs transition ${currentTab === "dashboard" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}>
                                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard Overview
                                    </button>
                                    
                                    <div class="px-3 mb-2 mt-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Operational Modules</div>
                                    <button onClick={() => setCurrentTab("vault")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left font-bold text-xs transition ${currentTab === "vault" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}>
                                        <i data-lucide="folder-git" class="w-4 h-4"></i> Resource Vault
                                    </button>
                                    <button onClick={() => setCurrentTab("quizzes")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left font-bold text-xs transition ${currentTab === "quizzes" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}>
                                        <i data-lucide="sparkles" class="w-4 h-4"></i> Board Prep Prep
                                    </button>
                                    <button onClick={() => setCurrentTab("treasury")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left font-bold text-xs transition ${currentTab === "treasury" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}>
                                        <i data-lucide="wallet" class="w-4 h-4"></i> Treasury Ledger
                                    </button>
                                    <button onClick={() => setCurrentTab("planner")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left font-bold text-xs transition ${currentTab === "planner" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}>
                                        <i data-lucide="calendar-days" class="w-4 h-4"></i> Study Planner
                                    </button>
                                    <button onClick={() => setCurrentTab("calendar")} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left font-bold text-xs transition ${currentTab === "calendar" ? "active-tab shadow-md text-black" : "text-slate-400 hover:bg-slate-900"}`}>
                                        <i data-lucide="calendar" class="w-4 h-4"></i> Rotations Calendar
                                    </button>
                                </nav>
                                <div class="p-4 border-t border-white/5 space-y-2">
                                    <div class="flex items-center space-x-2 text-[10px] text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1 rounded-full w-fit mx-auto">
                                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                                        <span>Matrix Secured</span>
                                    </div>
                                    <button onClick={handleLogout} class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-rose-950/20 text-xs font-bold text-rose-400 transition">
                                        <span>Disconnect Port</span>
                                        <i data-lucide="log-out" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </aside>

                            {/* Center Canvas Workspace Display */}
                            <main class="flex-1 flex flex-col h-full bg-slate-950 overflow-y-auto no-scrollbar pb-16 md:pb-0">
                                <header class="h-16 border-b border-white/5 px-6 flex items-center justify-between shrink-0 backdrop-blur-md sticky top-0 z-50 bg-slate-950/80">
                                    <div class="flex items-center gap-2">
                                        <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">{currentTab}</span>
                                        <span class="text-slate-700">/</span>
                                        <span class="text-xs font-extrabold text-white uppercase tracking-wider">Console Node</span>
                                    </div>
                                    {currentTab === "planner" && (
                                        <button onClick={() => setTaskModalOpen(true)} class="px-3.5 py-1.5 bg-white text-slate-950 text-xs font-bold rounded-lg hover:opacity-90 transition flex items-center gap-2 shadow-sm">
                                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Planner Task
                                        </button>
                                    )}
                                </header>

                                <div class="flex-1 p-6 md:p-8 space-y-6 max-w-7xl w-full mx-auto">
                                    
                                    {/* LANDING TAB: ANNOUNCEMENT + WEEKLY SCHEDULE ONLY */}
                                    {currentTab === "dashboard" && (
                                        <div class="space-y-6 text-left">
                                            {/* Administrative Announcements Layer */}
                                            {announcement && (
                                                <div class="glass-panel p-5 border-l-4 border-l-blue-500 shadow-xl relative overflow-hidden">
                                                    <div class="flex items-start space-x-4">
                                                        <div class="p-2 bg-blue-500/10 rounded-xl text-blue-400 mt-0.5">
                                                            <i data-lucide="megaphone" class="w-5 h-5"></i>
                                                        </div>
                                                        <div class="flex-1 space-y-1">
                                                            <div class="flex items-center space-x-2">
                                                                <h3 class="font-bold text-base text-white">{announcement.title || 'Central Operational Notice'}</h3>
                                                                {announcement.is_high_priority && (
                                                                    <span class="text-[10px] font-bold uppercase tracking-wider bg-rose-500/20 text-rose-400 px-2 py-0.5 rounded border border-rose-500/30">Urgent</span>
                                                                )}
                                                            </div>
                                                            <p class="text-sm text-slate-300 leading-relaxed">{announcement.content}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            {/* Comprehensive Weekly Schedule Block */}
                                            <div class="glass-panel p-6 shadow-xl space-y-4">
                                                <div class="flex items-center justify-between border-b border-white/5 pb-3">
                                                    <div class="flex items-center space-x-2.5">
                                                        <i data-lucide="calendar-days" class="w-5 h-5 text-purple-400"></i>
                                                        <h2 class="font-semibold text-lg text-white tracking-tight">Weekly Timetable Matrix</h2>
                                                    </div>
                                                    <span class="text-xs text-slate-400">{new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}</span>
                                                </div>
                                                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
                                                    {daysNames.map((day, idx) => {
                                                        const i = idx + 1;
                                                        const isToday = i === currentDayInt;
                                                        const dayItems = weeklySchedule.filter(item => item.day_of_week === i);
                                                        return (
                                                            <div key={day} class={`glass-panel rounded-xl p-3 border ${isToday ? 'bg-blue-500/10 border-blue-500/40 ring-1 ring-blue-500/30' : 'bg-slate-950/40 border-white/5'} flex flex-col justify-between min-h-[140px]`}>
                                                                <div>
                                                                    <h4 class={`text-xs uppercase tracking-wider ${isToday ? 'text-blue-400 font-bold' : 'text-slate-400 font-medium'}`}>{day}</h4>
                                                                    {dayItems.length === 0 ? (
                                                                        <p class="text-[11px] text-slate-600 italic pt-2">No items</p>
                                                                    ) : dayItems.map((item, dIdx) => (
                                                                        <div key={dIdx} class="border-t border-white/5 mt-1.5 pt-1.5 space-y-0.5">
                                                                            <p class="text-[11px] font-semibold text-slate-200 line-clamp-2">{item.subject_title}</p>
                                                                            <p class="text-[10px] text-slate-400">{item.time_slot}</p>
                                                                            {item.location_or_link && (
                                                                                <p class="text-[9px] text-purple-400 truncate"><i data-lucide="map-pin" class="w-2.5 h-2.5 inline mr-0.5"></i>{item.location_or_link}</p>
                                                                            )}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB: RESOURCE VAULT MODULE */}
                                    {currentTab === "vault" && (
                                        <div class="space-y-6 text-left">
                                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-white/5 pb-4">
                                                <div>
                                                    <h2 class="font-semibold text-lg text-white tracking-tight">Three-Tier Resource Vault</h2>
                                                    <p class="text-xs text-slate-400">Class directories segmented across academic asset categories.</p>
                                                </div>
                                                <div class="flex bg-slate-950/60 p-1 rounded-xl border border-white/5 text-xs">
                                                    {["Book", "Note", "Sud an"].map(cat => (
                                                        <button key={cat} onClick={() => setVaultCategory(cat)} class={`px-4 py-2 rounded-lg font-medium transition-all ${vaultCategory === cat ? "bg-blue-500/20 text-blue-400 border border-blue-500/30" : "text-slate-400 hover:text-white"}`}>
                                                            {cat === "Sud an" ? "Sud an" : `${cat}s`}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {vaultCache.filter(item => item.category === vaultCategory).length === 0 ? (
                                                    <div class="col-span-full py-12 text-center text-xs text-slate-500 italic">No assets registered in this vault tier.</div>
                                                ) : vaultCache.filter(item => item.category === vaultCategory).map((doc, idx) => (
                                                    <div key={idx} class="bg-slate-950/30 border border-white/5 rounded-xl p-4 flex items-center justify-between hover:border-white/10 transition-all group premium-card">
                                                        <div class="space-y-1 max-w-[70%]">
                                                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">{doc.subject || 'General Document'}</span>
                                                            <h4 class="text-sm font-semibold text-slate-200 truncate group-hover:text-blue-400 transition-colors">{doc.title}</h4>
                                                            <p class="text-xs text-slate-400 line-clamp-1">{doc.description || 'No descriptive summary added.'}</p>
                                                        </div>
                                                        <div class="flex items-center space-x-2 shrink-0">
                                                            <a href={getCleanPreviewUrl(doc.gdrive_url)} target="_blank" class="p-2 bg-white/5 hover:bg-blue-500/20 text-slate-300 hover:text-blue-400 rounded-lg border border-white/5 transition-all"><i data-lucide="eye" class="w-4 h-4"></i></a>
                                                            <a href={getDownloadLink(doc.gdrive_url)} target="_blank" class="p-2 bg-white/5 hover:bg-emerald-500/20 text-slate-300 hover:text-emerald-400 rounded-lg border border-white/5 transition-all"><i data-lucide="download" class="w-4 h-4"></i></a>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB: INTERACTIVE BOARDS PREP */}
                                    {currentTab === "quizzes" && (
                                        <div class="space-y-6 text-left max-w-3xl mx-auto">
                                            <div class="border-b border-white/5 pb-3">
                                                <h2 class="font-semibold text-lg text-white tracking-tight">Interactive Board Evaluations</h2>
                                                <p class="text-xs text-slate-400">Randomized evaluation matrix modules synced directly to assessment repositories.</p>
                                            </div>
                                            <div class="space-y-3">
                                                {quizzes.length === 0 ? (
                                                    <p class="text-xs text-slate-500 italic text-center py-4">No examination question paths available.</p>
                                                ) : quizzes.map((q, idx) => (
                                                    <a key={idx} href={q.quiz_url} target="_blank" class="flex items-center justify-between p-4 bg-slate-900/40 border border-white/5 hover:border-amber-500/30 rounded-xl transition-all group premium-card">
                                                        <div class="space-y-1">
                                                            <p class="text-sm font-semibold text-slate-200 group-hover:text-amber-400 transition-colors">{q.title}</p>
                                                            <span class="inline-block text-[10px] font-bold uppercase bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded">{q.question_count || '?'} Questions Indexed</span>
                                                        </div>
                                                        <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-500 group-hover:text-amber-400 transition-all"></i>
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB: TREASURY BALANCES SHEET */}
                                    {currentTab === "treasury" && (
                                        <div class="space-y-6 text-left max-w-3xl mx-auto">
                                            <div class="border-b border-white/5 pb-3">
                                                <h2 class="font-semibold text-lg text-white tracking-tight">Treasury Balance Sheets</h2>
                                                <p class="text-xs text-slate-400">Class ledger oversight tracking transactional ledger distributions.</p>
                                            </div>
                                            <div class="bg-slate-950/50 rounded-xl p-6 border border-white/5 text-center relative overflow-hidden">
                                                <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Net Combined Appropriations</p>
                                                <h3 class={`text-3xl font-bold tracking-tight mt-1 ${netBalance < 0 ? 'text-rose-400' : 'text-emerald-400'}`}>
                                                    {netBalance < 0 ? '-' : ''}₱{Math.abs(netBalance).toLocaleString('en-US', { minimumFractionDigits: 2 })}
                                                </h3>
                                            </div>
                                            <div class="space-y-2">
                                                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest px-1">Ledger Transaction Logs</p>
                                                <div class="space-y-1.5 max-h-[350px] overflow-y-auto pr-1">
                                                    {ledger.length === 0 ? (
                                                        <p class="text-xs text-slate-500 italic text-center py-4">No logged appropriations discovered.</p>
                                                    ) : ledger.map((txn, idx) => {
                                                        const val = parseFloat(txn.amount);
                                                        return (
                                                            <div key={idx} class="flex items-center justify-between p-3 rounded-xl bg-slate-900/40 border border-white/5 text-xs">
                                                                <div class="space-y-0.5 truncate pr-4">
                                                                    <p class="text-slate-200 font-medium truncate">{txn.description}</p>
                                                                    <p class="text-[10px] text-slate-500">{new Date(txn.transaction_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</p>
                                                                </div>
                                                                <span class={`px-2 py-1 rounded-md font-mono font-bold border text-[11px] shrink-0 ${val >= 0 ? 'text-emerald-400 bg-emerald-500/5 border-emerald-500/10' : 'text-rose-400 bg-rose-500/5 border-rose-500/10'}`}>
                                                                    {val >= 0 ? '+' : ''}₱{val.toLocaleString('en-US', { minimumFractionDigits: 2 })}
                                                                </span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB: INTERACTIVE WORK PLANNER */}
                                    {currentTab === "planner" && (
                                        <div class="space-y-6 text-left max-w-4xl mx-auto">
                                            <div class="border-b border-white/5 pb-2 flex justify-between items-center">
                                                <div>
                                                    <h2 class="font-semibold text-lg text-white tracking-tight">Interactive Work Planner</h2>
                                                    <p class="text-xs text-slate-400">Track task prioritization layers associated with operational tracks.</p>
                                                </div>
                                                <div class="text-xs text-slate-400 font-bold">
                                                    Progress: {tasks.filter(t => t.status === "Done").length} / {tasks.length} Done
                                                </div>
                                            </div>
                                            <div class="space-y-3">
                                                {tasks.length === 0 ? (
                                                    <div class="p-12 text-center text-xs text-slate-500 italic border border-dashed border-white/10 rounded-2xl">
                                                        Your internal study workload planner queue is empty. Use the top button to generate an event track.
                                                    </div>
                                                ) : tasks.map(t => (
                                                    <div key={t.id} class={`p-4 bg-slate-900/40 border border-white/5 rounded-xl flex items-center justify-between gap-4 premium-card ${t.status === "Done" ? "opacity-50" : ""}`}>
                                                        <div class="flex items-center space-x-3 truncate">
                                                            <button onClick={() => {
                                                                setTasks(prev => prev.map(item => item.id === t.id ? { ...item, status: item.status === "Todo" ? "Done" : "Todo" } : item));
                                                            }} class="shrink-0 focus:outline-none">
                                                                <div class={`w-5 h-5 rounded-md border flex items-center justify-center transition-all ${t.status === "Done" ? "bg-white border-white text-slate-950" : "border-white/20 hover:border-white/40"}`}>
                                                                    {t.status === "Done" && <i data-lucide="check" class="w-3.5 h-3.5 stroke-[3]"></i>}
                                                                </div>
                                                            </button>
                                                            <div class="truncate">
                                                                <p class={`text-sm font-medium text-slate-200 truncate ${t.status === "Done" ? "line-through text-slate-500" : ""}`}>{t.text}</p>
                                                                <div class="flex items-center gap-2 mt-1 text-[10px] text-slate-500 font-bold uppercase tracking-wider">
                                                                    <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> {t.dueDate}</span>
                                                                    <span>•</span>
                                                                    <span class="flex items-center gap-1">{getSubjectIcon(t.subject)} {t.subject}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div class="flex items-center space-x-3 shrink-0">
                                                            <span class={`text-[9px] font-extrabold px-2 py-0.5 rounded uppercase border tracking-wider ${t.priority === "High" ? "bg-rose-500/10 text-rose-400 border-rose-500/20" : t.priority === "Medium" ? "bg-amber-500/10 text-amber-400 border-amber-500/20" : "bg-slate-800 text-slate-400 border-white/5"}`}>
                                                                {t.priority}
                                                            </span>
                                                            <button onClick={() => setTasks(prev => prev.filter(item => item.id !== t.id))} class="text-slate-500 hover:text-rose-400 transition-colors">
                                                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB: ROTATIONS CALENDAR EMBED */}
                                    {currentTab === "calendar" && (
                                        <div class="space-y-6 text-left h-full flex flex-col">
                                            <div class="border-b border-white/5 pb-3 shrink-0">
                                                <h2 class="font-semibold text-lg text-white tracking-tight">Active Rotations Schedule</h2>
                                                <p class="text-xs text-slate-400">Class agenda matrices embedded directly from host domains.</p>
                                            </div>
                                            <div class="bg-slate-900 border border-white/5 p-2 rounded-2xl h-[60vh] min-h-[400px] shadow-sm flex-1">
                                                <iframe src="https://calendar.google.com/calendar/embed?src=en.philippines%23holiday%40group.v.calendar.google.com&ctz=Asia%2FManila" 
                                                        style={{border: 0, borderRadius: "0.75rem"}} class="w-full h-full opacity-70 invert contrast-125" frameborder="0" scrolling="no"></iframe>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            </main>

                            {/* Mobile Bottom Dock Navigation Panel */}
                            <nav class="md:hidden fixed bottom-0 left-0 w-full h-16 bg-slate-950/80 backdrop-blur-md border-t border-white/5 z-40 px-2 flex justify-around items-center">
                                <button onClick={() => setCurrentTab("dashboard")} class={`flex flex-col items-center justify-center p-1 rounded ${currentTab === "dashboard" ? "text-white" : "text-slate-500"}`}>
                                    <i data-lucide="layout-dashboard" class="w-5 h-5 mb-0.5"></i>
                                    <span class="text-[9px] font-bold">Overview</span>
                                </button>
                                <button onClick={() => setCurrentTab("vault")} class={`flex flex-col items-center justify-center p-1 rounded ${currentTab === "vault" ? "text-white" : "text-slate-500"}`}>
                                    <i data-lucide="folder-git" class="w-5 h-5 mb-0.5"></i>
                                    <span class="text-[9px] font-bold">Vault</span>
                                </button>
                                <button onClick={() => setCurrentTab("quizzes")} class={`flex flex-col items-center justify-center p-1 rounded ${currentTab === "quizzes" ? "text-white" : "text-slate-500"}`}>
                                    <i data-lucide="sparkles" class="w-5 h-5 mb-0.5"></i>
                                    <span class="text-[9px] font-bold">Prep</span>
                                </button>
                                <button onClick={() => setCurrentTab("treasury")} class={`flex flex-col items-center justify-center p-1 rounded ${currentTab === "treasury" ? "text-white" : "text-slate-500"}`}>
                                    <i data-lucide="wallet" class="w-5 h-5 mb-0.5"></i>
                                    <span class="text-[9px] font-bold">Ledger</span>
                                </button>
                                <button onClick={() => setCurrentTab("planner")} class={`flex flex-col items-center justify-center p-1 rounded ${currentTab === "planner" ? "text-white" : "text-slate-500"}`}>
                                    <i data-lucide="calendar-days" class="w-5 h-5 mb-0.5"></i>
                                    <span class="text-[9px] font-bold">Planner</span>
                                </button>
                            </nav>
                        </div>
                    )}

                    {/* STUDY TASK GENERATOR CONFIG MODAL */}
                    {taskModalOpen && (
                        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center px-4">
                            <div class="bg-slate-900 border border-white/5 rounded-3xl max-w-md w-full p-6 shadow-2xl space-y-4 glass-panel text-left">
                                <div class="flex justify-between items-center border-b border-white/5 pb-3">
                                    <h3 class="font-extrabold text-base text-white">New Study Planner Task</h3>
                                    <button onClick={() => setTaskModalOpen(false)} class="text-slate-400 hover:text-white transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                                </div>
                                <form onSubmit={handleAddTask} class="space-y-4 text-xs text-left">
                                    <div class="space-y-1">
                                        <label class="font-bold text-slate-400 uppercase tracking-wide">Task Objective Label</label>
                                        <input type="text" required value={newTask.text} onChange={(e) => setNewTask({ ...newTask, text: e.target.value })} placeholder="E.g., Read Neuroanatomy Embryology Transes" class="w-full px-3.5 py-2.5 bg-slate-950 border border-white/5 rounded-xl outline-none text-xs font-semibold text-white focus:border-white/20 transition-all" />
                                    </div>
                                    <div class="grid grid-cols-2 gap-3">
                                        <div class="space-y-1">
                                            <label class="font-bold text-slate-400 uppercase tracking-wide">Task Priority</label>
                                            <select value={newTask.priority} onChange={(e) => setNewTask({ ...newTask, priority: e.target.value })} class="w-full px-3.5 py-2.5 bg-slate-950 border border-white/5 rounded-xl outline-none text-xs font-semibold text-slate-300 cursor-pointer">
                                                <option value="High">High</option>
                                                <option value="Medium">Medium</option>
                                                <option value="Low">Low</option>
                                            </select>
                                        </div>
                                        <div class="space-y-1">
                                            <label class="font-bold text-slate-400 uppercase tracking-wide">Target Deadline</label>
                                            <input type="date" value={newTask.dueDate} onChange={(e) => setNewTask({ ...newTask, dueDate: e.target.value })} class="w-full px-3.5 py-2.5 bg-slate-950 border border-white/5 rounded-xl outline-none text-xs font-semibold text-slate-300" />
                                        </div>
                                    </div>
                                    <div class="space-y-1">
                                        <label class="font-bold text-slate-400 uppercase tracking-wide">Associated Medical Subject</label>
                                        <input type="text" value={newTask.subject} onChange={(e) => setNewTask({ ...newTask, subject: e.target.value })} placeholder="E.g., Pharmacology, Neuroanatomy" class="w-full px-3.5 py-2.5 bg-slate-950 border border-white/5 rounded-xl outline-none text-xs font-semibold text-white" />
                                    </div>
                                    <div class="pt-3 flex gap-2">
                                        <button type="button" onClick={() => setTaskModalOpen(false)} class="w-1/2 py-3 bg-white/5 text-slate-300 font-bold rounded-xl hover:bg-white/10 transition-all">Cancel</button>
                                        <button type="submit" class="w-1/2 py-3 bg-white text-slate-950 font-bold rounded-xl hover:bg-slate-200 transition-all">Save Work Track</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
