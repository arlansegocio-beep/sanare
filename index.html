<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SU Archives</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Premium Fontshare Typography System -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500&f[]=geist@400,500,600,700&display=swap" rel="stylesheet">
    <!-- Premium Phosphor Vector Icon Ecosystem -->
    <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2"></script>
    <!-- Supabase Core System Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#b4c5ff", "primary-fixed": "#dbe1ff" },
                    fontFamily: { 
                        sans: ["Geist", "Inter", "sans-serif"], 
                        display: ["Satoshi", "Manrope", "sans-serif"], 
                        mono: ["JetBrains Mono", "monospace"] 
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        body {
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-image 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .global-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-[#f8f9fa] dark:bg-[#050508] text-gray-900 dark:text-white min-h-screen flex antialiased selection:bg-primary/30 selection:text-primary">

    <div id="root" class="w-full flex min-h-screen"></div>

    <!-- Core Runtime Compilers -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Engine Infrastructure Script -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = "https://cvzwkifoexnjbtuvwxjr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__VapXVAabPKcv6lXJ8Agag_1nxbP4ay";
        const coreClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [currentPage, setCurrentPage] = useState("auth"); 
            const [currentTab, setCurrentTab] = useState("dashboard"); 
            const [authError, setAuthError] = useState("");
            const [isVerifying, setIsVerifying] = useState(false);
            
            // Layout UX State Controls
            const [isDark, setIsDark] = useState(true);
            const [toasts, setToasts] = useState([]);
            const [userFirstName, setUserFirstName] = useState("Scholar");

            // Cloud Database States
            const [announcement, setAnnouncement] = useState(null);
            const [weeklySchedule, setWeeklySchedule] = useState([]);
            const [books, setBooks] = useState([]);
            const [academicResources, setAcademicResources] = useState([]);
            const [batchFolders, setBatchFolders] = useState([]);
            const [configMap, setConfigMap] = useState({});

            // Layout Filter Pointers
            const [selectedBatch, setSelectedBatch] = useState("Sanare");
            const [selectedSemester, setSelectedSemester] = useState("1st Semester");

            // Drill Down Interactive Nodes
            const [activeSubject, setActiveSubject] = useState(null);
            const [expandedBlocks, setExpandedBlocks] = useState({});

            // Ambient Theme Sync Monitor Listener
            useEffect(() => {
                const body = document.body;
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    body.style.backgroundColor = "#050508";
                    body.style.backgroundImage = "radial-gradient(circle at top right, rgba(180, 197, 255, 0.08), transparent 40%), radial-gradient(circle at bottom left, rgba(20, 30, 80, 0.18), transparent 45%), radial-gradient(circle at 15% 50%, rgba(20, 30, 80, 0.12), transparent 25%), radial-gradient(circle at 85% 30%, rgba(20, 30, 80, 0.12), transparent 25%)";
                } else {
                    document.documentElement.classList.remove('dark');
                    body.style.backgroundColor = "#f8f9fa";
                    body.style.backgroundImage = "radial-gradient(circle at top left, rgba(211, 238, 122, 0.12), transparent 50%), radial-gradient(circle at 85% 20%, rgba(121, 80, 242, 0.04), transparent 40%), radial-gradient(circle at bottom left, rgba(211, 238, 122, 0.05), transparent 45%)";
                }
            }, [isDark]);

            useEffect(() => {
                setActiveSubject(null);
                setExpandedBlocks({});
            }, [currentTab]);

            useEffect(() => {
                const { data: { subscription } } = coreClient.auth.onAuthStateChange(async (event, session) => {
                    if (session) {
                        setIsVerifying(true);
                        const loggedInEmail = session.user?.email;

                        const { data: whitelistCheck, error: whitelistError } = await coreClient
                            .from('allowed_emails')
                            .select('*')
                            .eq('email', loggedInEmail);

                        if (whitelistError || !whitelistCheck || whitelistCheck.length === 0) {
                            setAuthError("Access Denied: Your Gmail account is not whitelisted.");
                            setIsVerifying(false);
                            setCurrentPage("auth");
                            await coreClient.auth.signOut();
                            return;
                        }

                        const profileRow = whitelistCheck[0];
                        const designatedName = profileRow.first_name || profileRow.name || session.user?.user_metadata?.full_name || "Scholar";
                        setUserFirstName(designatedName.split(' ')[0].trim());

                        setAuthError("");
                        setIsVerifying(false);
                        setCurrentPage("dashboard");
                        
                        fetchConfig();
                        fetchAnnouncements();
                        fetchTimetable();
                        fetchBooks();
                        fetchAcademicResources();
                        fetchBatchFolders();
                    } else {
                        setCurrentPage("auth");
                    }
                });
                return () => subscription.unsubscribe();
            }, []);

            // --- CLOUD SOURCE SYNCHRONIZATION ---
            async function fetchConfig() {
                const { data } = await coreClient.from('system_config').select('*');
                if (data) {
                    const mapped = {};
                    data.forEach(item => mapped[item.key] = item.value);
                    setConfigMap(mapped);
                }
            }
            async function fetchAnnouncements() {
                const { data } = await coreClient.from('announcements').select('*').order('date_posted', { ascending: false }).limit(1);
                if (data && data.length > 0) setAnnouncement(data[0]);
                else setAnnouncement(null);
            }
            async function fetchTimetable() {
                const { data } = await coreClient.from('weekly_schedule').select('*').order('day_of_week', { ascending: true });
                if (data) setWeeklySchedule(data);
            }
            async function fetchBooks() {
                const { data } = await coreClient.from('medical_books').select('*').order('book_name', { ascending: true });
                if (data) setBooks(data);
            }
            async function fetchAcademicResources() {
                const { data } = await coreClient.from('academic_resources').select('*').order('topic', { ascending: true });
                if (data) setAcademicResources(data);
            }
            async function fetchBatchFolders() {
                const { data } = await coreClient.from('batch_folders').select('*').order('topic', { ascending: true });
                if (data) setBatchFolders(data);
            }

            const triggerSystemToastAlert = (topicTitle) => {
                const hashId = Date.now();
                setToasts(prev => [...prev, { id: hashId, title: topicTitle }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(toast => toast.id !== hashId));
                }, 4000);
            };

            const resolveDriveLinks = (rawUrl) => {
                if (!rawUrl) return { preview: '#', download: '#' };
                const str = String(rawUrl).trim();
                let fileId = '';
                if (str.includes('/d/')) { fileId = str.split('/d/')[1].split('/')[0]; }
                else if (str.includes('id=')) { fileId = str.split('id=')[1].split('&')[0]; }

                if (fileId) {
                    if (str.includes('docs.google.com/document')) {
                        return { preview: `https://docs.google.com/document/d/${fileId}/preview`, download: `https://docs.google.com/document/d/${fileId}/export?format=pdf` };
                    }
                    return { preview: `https://drive.google.com/file/d/${fileId}/preview`, download: `https://drive.google.com/uc?export=download&id=${fileId}` };
                }
                return { preview: str, download: str };
            };

            const toggleBlock = (blockName) => {
                setExpandedBlocks(prev => ({ ...prev, [blockName]: !prev[blockName] }));
            };

            const getSubjectIcon = (subj) => {
                const clean = String(subj).toLowerCase();
                if (clean.includes('anatomy')) return 'ph-skull';
                if (clean.includes('pathology') || clean.includes('path')) return 'ph-microscope';
                if (clean.includes('pharmaco') || clean.includes('pharma')) return 'ph-pill';
                if (clean.includes('histology')) return 'ph-layers';
                if (clean.includes('biochem')) return 'ph-atom';
                if (clean.includes('micro') || clean.includes('para')) return 'ph-virus';
                if (clean.includes('medicine')) return 'ph-heartbeat';
                if (clean.includes('pediatrics') || clean.includes('pedia')) return 'ph-baby';
                if (clean.includes('surgery')) return 'ph-scissors';
                if (clean.includes('ethics')) return 'ph-scales';
                if (clean.includes('epidemiology') || clean.includes('research') || clean.includes('come')) return 'ph-chart-bar';
                if (clean.includes('ob')) return 'ph-gender-female';
                if (clean.includes('psychiatry') || clean.includes('psych')) return 'ph-brain';
                if (clean.includes('quiz') || clean.includes('exam')) return 'ph-lightning';
                return 'ph-folder-open';
            };

            // --- DATA ARRAY MANIFEST MAPPING POINTERS ---
            const groupedBooks = useMemo(() => {
                const map = {};
                books.forEach(b => {
                    if(!map[b.subject]) map[b.subject] = [];
                    map[b.subject].push(b);
                });
                return map;
            }, [books]);

            const filteredResources = useMemo(() => {
                return academicResources.filter(r => r.resource_type === currentTab && r.batch === selectedBatch && r.semester === selectedSemester);
            }, [academicResources, currentTab, selectedBatch, selectedSemester]);

            const groupedResourcesBySubject = useMemo(() => {
                const map = {};
                filteredResources.forEach(r => {
                    if(!map[r.subject]) map[r.subject] = [];
                    map[r.subject].push(r);
                });
                return map;
            }, [filteredResources]);

            const activeSubjectMasterBlocks = useMemo(() => {
                if (!activeSubject) return {};
                const items = groupedResourcesBySubject[activeSubject] || [];
                const map = {};
                
                items.forEach(item => {
                    let master = item.block;
                    const match = String(item.block).match(/Block\s+(\d+)/i);
                    if (match) master = `Block ${match[1]}`;
                    
                    if (!map[master]) map[master] = {};
                    let sub = item.block;
                    if (!map[master][sub]) map[master][sub] = [];
                    map[master][sub].push(item);
                });
                return map;
            }, [activeSubject, groupedResourcesBySubject]);

            const daysNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
            const currentDayInt = new Date().getDay() === 0 ? 7 : new Date().getDay();

            const TabNames = {
                dashboard: "Overview Dashboard",
                books: "Medical Books",
                Note: "Lecture Notes",
                Sud_An: "Recalls Archives",
                Fresh_Sud_An: "New Recalls",
                Questionnaire: "Interactive Quizzes",
                folders: "Batch Folders",
                calendar: "School Calendar"
            };

            return (
                <div class="w-full flex min-h-screen overflow-x-hidden relative font-sans">
                    
                    {/* APP HUD ALERT MESSAGING OVERLAY LAYER */}
                    <div class="fixed bottom-20 md:bottom-6 right-6 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none">
                        {toasts.map(toast => (
                            <div key={toast.id} class="pointer-events-auto bg-white/90 dark:bg-[#121318]/95 glass-panel border border-emerald-500/30 dark:border-emerald-500/20 shadow-xl p-4 rounded-[20px] flex items-start gap-3 animate-slide-up text-left shadow-[0_10px_30px_rgba(0,0,0,0.15)]">
                                <div class="p-1 bg-emerald-500/10 rounded-lg text-emerald-500 flex items-center justify-center shrink-0 mt-0.5">
                                    <i class="ph ph-check-circle text-sm font-bold"></i>
                                </div>
                                <div class="flex-1 overflow-hidden">
                                    <h4 class="text-xs font-bold text-gray-900 dark:text-white font-display">System Download Activated</h4>
                                    <p class="text-[11px] text-gray-500 dark:text-gray-400 font-medium leading-tight mt-1 whitespace-normal break-words">{toast.title}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* GATE LOGIN CORE PANEL */}
                    {currentPage === "auth" && (
                        <div class="flex-1 flex items-center justify-center px-4 relative z-10">
                            <div class="max-w-md w-full bg-white dark:bg-[#0c0d12] border border-gray-100 dark:border-white/5 shadow-2xl rounded-[32px] p-8 text-center space-y-6">
                                <div class="mx-auto w-16 h-16 bg-[#7950f2]/10 rounded-[14px] border border-[#7950f2]/20 flex items-center justify-center">
                                    <i class="ph ph-shield-check text-3xl text-[#7950f2]"></i>
                                </div>
                                <div class="space-y-2">
                                    <h2 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white font-display">Sanare Command Hub</h2>
                                    <p class="text-sm text-gray-500 dark:text-gray-400">Private Academic Terminal. Access restricted strictly to authorized credentials.</p>
                                </div>
                                <button onClick={async () => { setAuthError(""); const { error } = await coreClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } }); if (error) setAuthError(error.message); }} disabled={isVerifying} class="w-full py-3.5 px-4 bg-gray-900 dark:bg-white text-white dark:text-gray-950 font-bold rounded-[14px] hover:opacity-90 transition-all flex items-center justify-center space-x-3">
                                    <span>Authorize with Gmail</span>
                                </button>
                                {authError && <div class="text-xs text-rose-500 bg-rose-50 dark:bg-rose-500/10 border border-rose-200 dark:border-rose-500/20 py-2 px-3 rounded-[14px]">{authError}</div>}
                            </div>
                        </div>
                    )}

                    {/* MAIN APPLICATION CONSOLE INTERFACE CANVAS */}
                    {currentPage === "dashboard" && (
                        <div class="w-full flex min-h-screen">
                            
                            {/* FLUID COLLAPSIBLE HOVER SIDEBAR PANELS LAYER */}
                            <aside class="hidden md:flex flex-col fixed left-0 top-0 h-full bg-white dark:bg-[#0c0d12] glass-panel border-r border-gray-100 dark:border-white/5 py-8 z-50 transition-all duration-300 ease-in-out w-20 hover:w-64 group/sidebar shadow-sm">
                                <div class="px-5 mb-8 flex items-center gap-3.5 shrink-0 overflow-hidden relative w-full">
                                    <div class="w-10 h-10 shrink-0 rounded-[14px] bg-[#7950f2]/10 border border-[#7950f2]/20 flex items-center justify-center shadow-sm">
                                        <i class="ph ph-first-aid text-[#7950f2] text-xl"></i>
                                    </div>
                                    <div class="transition-all duration-300 flex flex-col justify-center whitespace-nowrap overflow-hidden opacity-0 w-0 group-hover/sidebar:opacity-100 group-hover/sidebar:w-40">
                                        <h1 class="font-display font-extrabold text-[17px] text-gray-900 dark:text-white tracking-widest leading-none">SANARE ULTRA</h1>
                                        <p class="text-[10px] italic text-gray-400 dark:text-gray-500 font-medium leading-none mt-1">to heal beyond</p>
                                    </div>
                                </div>
                                <nav class="flex-1 px-4 space-y-1.5 overflow-y-auto no-scrollbar text-left overflow-x-hidden">
                                    {[
                                        { id: "dashboard", icon: "ph-terminal-window" },
                                        { id: "books", icon: "ph-books" },
                                        { id: "Note", icon: "ph-file-text" },
                                        { id: "Sud_An", icon: "ph-notebook" },
                                        { id: "Fresh_Sud_An", icon: "ph-newspaper" },
                                        { id: "Questionnaire", icon: "ph-brain" },
                                        { id: "folders", icon: "ph-folder-user" },
                                        { id: "calendar", icon: "ph-calendar-blank" }
                                    ].map(tab => (
                                        <button key={tab.id} onClick={() => setCurrentTab(tab.id)} class={`w-full flex items-center gap-3 p-3 rounded-[14px] transition whitespace-nowrap overflow-hidden ${currentTab === tab.id ? "bg-[#7950f2]/10 dark:bg-[#7950f2]/25 border border-[#7950f2]/20 text-black dark:text-[#b4c5ff] font-bold" : "text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-white/5"}`}>
                                            <i class={`ph ${tab.icon} shrink-0 text-[20px]`}></i>
                                            <span class="transition-all duration-300 opacity-0 w-0 group-hover/sidebar:opacity-100 group-hover/sidebar:w-auto">{TabNames[tab.id]}</span>
                                        </button>
                                    ))}
                                </nav>
                                <div class="px-4 mt-auto pt-4 border-t border-gray-100 dark:border-white/5 space-y-2 overflow-hidden">
                                    <button onClick={() => setIsDark(!isDark)} class="w-full flex items-center gap-3 p-3 rounded-[14px] hover:bg-gray-50 dark:hover:bg-white/5 text-gray-500 dark:text-gray-400 font-bold transition whitespace-nowrap overflow-hidden">
                                        <i class={`ph ${isDark ? 'ph-sun' : 'ph-moon'} shrink-0 text-[20px]`}></i>
                                        <span class="transition-all duration-300 opacity-0 w-0 group-hover/sidebar:opacity-100 group-hover/sidebar:w-auto">{isDark ? 'Light Mode' : 'Dark Mode'}</span>
                                    </button>
                                    <button onClick={async () => { await coreClient.auth.signOut(); window.location.reload(); }} class="w-full flex items-center gap-3 p-3 rounded-[14px] hover:bg-gray-50 dark:hover:bg-white/5 text-gray-500 dark:text-gray-400 font-bold transition whitespace-nowrap overflow-hidden">
                                        <i class="ph ph-sign-out shrink-0 text-[20px]"></i>
                                        <span class="transition-all duration-300 opacity-0 w-0 group-hover/sidebar:opacity-100 group-hover/sidebar:w-auto">Log Out</span>
                                    </button>
                                </div>
                            </aside>

                            {/* CORE CONTROL WORKSPACE LAYOUT PANELS */}
                            <main class="flex-1 flex flex-col relative min-h-screen transition-all duration-300 ease-in-out md:ml-20">
                                
                                {/* DUAL-LAYER RESPONSIVE APP COMPACT HEADER STRIP */}
                                <header class="sticky top-0 z-40 flex flex-col w-full bg-white dark:bg-[#0c0d12] glass-panel border-b border-gray-100 dark:border-white/5 shadow-sm">
                                    <div class="flex flex-col lg:flex-row lg:items-center justify-between px-6 py-4 gap-4 w-full">
                                        
                                        {/* TOP FLEXROW NODE: TITLE + MOBILE GREETING BADGE */}
                                        <div class="flex items-center justify-between w-full lg:w-auto">
                                            <h2 class="font-bold text-lg md:text-xl font-display tracking-tight text-gray-900 dark:text-white">{TabNames[currentTab]}</h2>
                                            
                                            {/* Mobile / Tablet View Identity Tag */}
                                            <div class="lg:hidden flex items-center gap-2 bg-[#7950f2]/10 dark:bg-[#7950f2]/20 border border-[#7950f2]/30 dark:border-[#7950f2]/40 px-3 py-1.5 rounded-full shadow-[0_2px_10px_rgba(121,80,242,0.1)] shrink-0">
                                                <span class="relative flex h-2 w-2">
                                                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
                                                </span>
                                                <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">
                                                    Welcome, <span class="font-display font-black text-[#7950f2] dark:text-[#b4c5ff]">{userFirstName}</span>
                                                </span>
                                            </div>
                                        </div>
                                        
                                        {/* LOWER/RIGHT FLEXROW NODE: FULLY UNLOCKED ADAPTIVE SEGMENT FILTERS */}
                                        <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto lg:ml-auto">
                                            {["Note", "Sud_An", "Fresh_Sud_An", "Questionnaire", "folders"].includes(currentTab) && (
                                                <div class="flex flex-row items-center gap-2.5 w-full lg:w-auto">
                                                    {/* Batch Selector */}
                                                    <div class="flex bg-gray-50 dark:bg-[#16171d] p-1 rounded-full border border-gray-100 dark:border-white/5 shadow-inner flex-1 sm:flex-initial justify-around">
                                                        {["Sanare", "Manus", "Vesties"].map(b => (
                                                            <button key={b} onClick={() => setSelectedBatch(b)} class={`px-3 py-1.5 rounded-[14px] text-[11px] font-bold transition flex-1 sm:flex-none text-center whitespace-nowrap ${selectedBatch === b ? "bg-white dark:bg-[#20222b] text-gray-900 dark:text-white shadow-sm border border-gray-200 dark:border-white/5" : "text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white"}`}>{b}</button>
                                                        ))}
                                                    </div>
                                                    {/* Semester Selector */}
                                                    <div class="flex bg-gray-50 dark:bg-[#16171d] p-1 rounded-full border border-gray-100 dark:border-white/5 shadow-inner flex-1 sm:flex-initial justify-around">
                                                        {["1st Semester", "2nd Semester"].map(s => (
                                                            <button key={s} onClick={() => setSelectedSemester(s)} class={`px-3 py-1.5 rounded-[14px] text-[11px] font-bold transition flex-1 sm:flex-none text-center whitespace-nowrap ${selectedSemester === s ? "bg-[#7950f2] text-white shadow-sm border border-[#7950f2]/20" : "text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white"}`}>{s === "1st Semester" ? "Sem 1" : "Sem 2"}</button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* Desktop Premium Identity Badge */}
                                            <div class="hidden lg:flex items-center gap-2.5 bg-[#7950f2]/10 dark:bg-[#7950f2]/20 border border-[#7950f2]/30 dark:border-[#7950f2]/40 px-4 py-2 rounded-full shadow-[0_2px_10px_rgba(121,80,242,0.1)] shrink-0 global-transition hover:scale-105">
                                                <span class="relative flex h-2 w-2">
                                                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
                                                </span>
                                                <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">
                                                    Welcome, <span class="font-display font-black text-[#7950f2] dark:text-[#b4c5ff]">{userFirstName}</span>
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </header>

                                <div class="flex-1 w-full relative p-6 md:p-8 max-w-[1600px] mx-auto pb-32">
                                    
                                    {/* COMPONENT MODULE: OVERVIEW DASHBOARD */}
                                    {currentTab === "dashboard" && (
                                        <div class="space-y-6 text-left max-w-4xl mx-auto">
                                            {/* BULLETIN SUMMARY ANNOUNCEMENT NODE */}
                                            <div class="bg-white dark:bg-[#0c0d12] rounded-tl-[48px] rounded-tr-[32px] rounded-br-[32px] rounded-bl-[32px] p-6 md:p-8 shadow-none border border-gray-100 dark:border-white/5 glass-panel">
                                                <div class="flex items-start gap-4">
                                                    <div class="p-3 bg-[#7950f2]/10 rounded-[14px] text-[#7950f2] flex items-center justify-center shrink-0">
                                                        <i class="ph ph-megaphone text-2xl"></i>
                                                    </div>
                                                    <div class="flex-1 space-y-1">
                                                        <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-1">
                                                            <h3 class="text-lg font-bold tracking-tight text-gray-900 dark:text-white font-display">Latest Bulletin Notice</h3>
                                                            {announcement && <span class="text-xs font-normal text-gray-400 dark:text-gray-500">{announcement.date_posted}</span>}
                                                        </div>

                                <button onClick={() => setIsDark(!isDark)} class="flex flex-col items-center justify-center shrink-0 min-w-[48px] h-full text-gray-400 dark:text-gray-500 transition-all active:scale-95">
                                    <i class={`ph ${isDark ? 'ph-sun' : 'ph-moon'} text-[20px] mb-0.5`}></i>
                                    <span class="text-[9px] tracking-tight">Theme</span>
                                </button>
                            </nav>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
