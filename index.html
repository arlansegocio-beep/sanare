<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANARE ULTRA | Premium Medical Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts Ecosystem -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- Google Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Supabase Core System JS Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#b4c5ff", "primary-fixed": "#dbe1ff" },
                    fontFamily: { sans: ["Inter", "sans-serif"], display: ["Manrope", "sans-serif"], mono: ["JetBrains Mono", "monospace"] }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .tree-line::before {
            content: ''; position: absolute; top: 24px; bottom: 0; left: 15px; width: 2px;
        }
        html.dark .tree-line::before { background-color: rgba(255, 255, 255, 0.1); }
        html:not(.dark) .tree-line::before { background-color: rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#09090B] text-slate-900 dark:text-white min-h-screen flex antialiased selection:bg-primary/30 selection:text-primary transition-colors duration-300">

    <div id="root" class="w-full flex min-h-screen"></div>

    <!-- React and Babel Engines -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Execution Script Engine -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = "https://cvzwkifoexnjbtuvwxjr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__VapXVAabPKcv6lXJ8Agag_1nxbP4ay";
        const coreClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [currentPage, setCurrentPage] = useState("auth"); 
            const [currentTab, setCurrentTab] = useState("dashboard"); 
            const [authError, setAuthError] = useState("");
            const [isVerifying, setIsVerifying] = useState(false);
            
            // UX Preferences State
            const [isDark, setIsDark] = useState(true);
            const [isSidebarPinned, setIsSidebarPinned] = useState(true);

            // Database Live State Arrays
            const [announcement, setAnnouncement] = useState(null);
            const [weeklySchedule, setWeeklySchedule] = useState([]);
            const [books, setBooks] = useState([]);
            const [academicResources, setAcademicResources] = useState([]);
            const [batchFolders, setBatchFolders] = useState([]);
            const [configMap, setConfigMap] = useState({});

            // Global Filter Selections
            const [selectedBatch, setSelectedBatch] = useState("Sanare");
            const [selectedSemester, setSelectedSemester] = useState("1st Semester");

            // Drill-Down UI Navigation Pointer States
            const [activeSubject, setActiveSubject] = useState(null);
            const [expandedBlocks, setExpandedBlocks] = useState({});

            // Toggle Dark Mode
            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            // Reset drill-downs instantly on tab switches
            useEffect(() => {
                setActiveSubject(null);
                setExpandedBlocks({});
            }, [currentTab]);

            useEffect(() => {
                const { data: { subscription } } = coreClient.auth.onAuthStateChange(async (event, session) => {
                    if (session) {
                        setIsVerifying(true);
                        const loggedInEmail = session.user?.email;

                        const { data: whitelistCheck, error: whitelistError } = await coreClient
                            .from('allowed_emails')
                            .select('email')
                            .eq('email', loggedInEmail);

                        if (whitelistError || !whitelistCheck || whitelistCheck.length === 0) {
                            setAuthError("Access Denied: Your Gmail account is not whitelisted.");
                            setIsVerifying(false);
                            setCurrentPage("auth");
                            await coreClient.auth.signOut();
                            return;
                        }

                        setAuthError("");
                        setIsVerifying(false);
                        setCurrentPage("dashboard");
                        
                        fetchConfig();
                        fetchAnnouncements();
                        fetchTimetable();
                        fetchBooks();
                        fetchAcademicResources();
                        fetchBatchFolders();
                    } else {
                        setCurrentPage("auth");
                    }
                });
                return () => subscription.unsubscribe();
            }, []);

            // --- DATABASE SYNC FETCH LAYERS ---
            async function fetchConfig() {
                const { data } = await coreClient.from('system_config').select('*');
                if (data) {
                    const mapped = {};
                    data.forEach(item => mapped[item.key] = item.value);
                    setConfigMap(mapped);
                }
            }
            async function fetchAnnouncements() {
                const { data } = await coreClient.from('announcements').select('*').order('date_posted', { ascending: false }).limit(1);
                if (data && data.length > 0) setAnnouncement(data[0]);
                else setAnnouncement(null); // Explicit fallback
            }
            async function fetchTimetable() {
                const { data } = await coreClient.from('weekly_schedule').select('*').order('day_of_week', { ascending: true });
                if (data) setWeeklySchedule(data);
            }
            async function fetchBooks() {
                const { data } = await coreClient.from('medical_books').select('*').order('book_name', { ascending: true });
                if (data) setBooks(data);
            }
            async function fetchAcademicResources() {
                const { data } = await coreClient.from('academic_resources').select('*').order('topic', { ascending: true });
                if (data) setAcademicResources(data);
            }
            async function fetchBatchFolders() {
                const { data } = await coreClient.from('batch_folders').select('*').order('topic', { ascending: true });
                if (data) setBatchFolders(data);
            }

            // --- G-DRIVE INSTANT STREAM PARSERS ---
            const resolveDriveLinks = (rawUrl) => {
                if (!rawUrl) return { preview: '#', download: '#' };
                const str = String(rawUrl).trim();
                let fileId = '';
                if (str.includes('/d/')) { fileId = str.split('/d/')[1].split('/')[0]; }
                else if (str.includes('id=')) { fileId = str.split('id=')[1].split('&')[0]; }

                if (fileId) {
                    if (str.includes('docs.google.com/document')) {
                        return { preview: `https://docs.google.com/document/d/${fileId}/preview`, download: `https://docs.google.com/document/d/${fileId}/export?format=pdf` };
                    }
                    return { preview: `https://drive.google.com/file/d/${fileId}/preview`, download: `https://drive.google.com/uc?export=download&id=${fileId}` };
                }
                return { preview: str, download: str };
            };

            const toggleBlock = (blockName) => {
                setExpandedBlocks(prev => ({ ...prev, [blockName]: !prev[blockName] }));
            };

            const getSubjectIcon = (subj) => {
                const clean = String(subj).toLowerCase();
                if (clean.includes('anatomy')) return 'skull';
                if (clean.includes('pathology')) return 'biotech';
                if (clean.includes('pharmaco')) return 'pill';
                if (clean.includes('histology')) return 'layers';
                if (clean.includes('biochem')) return 'molecule';
                if (clean.includes('microbio')) return 'coronavirus';
                if (clean.includes('quiz') || clean.includes('exam')) return 'psychology';
                return 'folder_open';
            };

            // --- ADVANCED DATA GROUPING LOGIC ---
            const groupedBooks = useMemo(() => {
                const map = {};
                books.forEach(b => {
                    if(!map[b.subject]) map[b.subject] = [];
                    map[b.subject].push(b);
                });
                return map;
            }, [books]);

            const filteredResources = useMemo(() => {
                return academicResources.filter(r => r.resource_type === currentTab && r.batch === selectedBatch && r.semester === selectedSemester);
            }, [academicResources, currentTab, selectedBatch, selectedSemester]);

            const groupedResourcesBySubject = useMemo(() => {
                const map = {};
                filteredResources.forEach(r => {
                    if(!map[r.subject]) map[r.subject] = [];
                    map[r.subject].push(r);
                });
                return map;
            }, [filteredResources]);

            const activeSubjectMasterBlocks = useMemo(() => {
                if (!activeSubject) return {};
                const items = groupedResourcesBySubject[activeSubject] || [];
                const map = {};
                
                items.forEach(item => {
                    let master = item.block;
                    const match = String(item.block).match(/Block\s+(\d+)/i);
                    if (match) master = `Block ${match[1]}`;
                    
                    if (!map[master]) map[master] = {};
                    let sub = item.block;
                    if (!map[master][sub]) map[master][sub] = [];
                    map[master][sub].push(item);
                });
                return map;
            }, [activeSubject, groupedResourcesBySubject]);

            const daysNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
            const currentDayInt = new Date().getDay() === 0 ? 7 : new Date().getDay();

            const TabNames = {
                dashboard: "Overview",
                books: "Medical Books",
                Note: "Lecture Notes",
                Sud_An: "Recalls",
                Fresh_Sud_An: "New Recalls",
                Questionnaire: "Interactive Quizzes",
                folders: "Batch Folders",
                calendar: "School Calendar"
            };

            return (
                <div class="w-full flex min-h-screen overflow-x-hidden relative">
                    {/* AUTH GATE PANEL VIEW */}
                    {currentPage === "auth" && (
                        <div class="flex-1 flex items-center justify-center px-4 relative z-10">
                            <div class="max-w-md w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/5 shadow-2xl rounded-3xl p-8 text-center space-y-6">
                                <div class="mx-auto w-16 h-16 bg-primary/10 rounded-2xl border border-primary/20 flex items-center justify-center">
                                    <span class="material-symbols-outlined text-3xl text-primary">shield_check</span>
                                </div>
                                <div class="space-y-2">
                                    <h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white font-display">Sanare Command Hub</h2>
                                    <p class="text-sm text-slate-500 dark:text-slate-400">Private Academic Terminal. Access restricted strictly to authorized credentials.</p>
                                </div>
                                <button onClick={async () => { setAuthError(""); const { error } = await coreClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } }); if (error) setAuthError(error.message); }} disabled={isVerifying} class="w-full py-3.5 px-4 bg-slate-900 dark:bg-white text-white dark:text-slate-950 font-bold rounded-xl hover:opacity-90 transition-all flex items-center justify-center space-x-3">
                                    <span>Authorize with Gmail</span>
                                </button>
                                {authError && <div class="text-xs text-rose-500 bg-rose-50 dark:bg-rose-500/10 border border-rose-200 dark:border-rose-500/20 py-2 px-3 rounded-xl">{authError}</div>}
                            </div>
                        </div>
                    )}

                    {/* MAIN APPLICATION NODE DESKTOPS */}
                    {currentPage === "dashboard" && (
                        <div class="w-full flex min-h-screen">
                            
                            {/* DYNAMIC COLLAPSIBLE SIDEBAR PANEL */}
                            <aside class={`hidden md:flex flex-col fixed left-0 top-0 h-full bg-white/80 dark:bg-[#09090B]/80 glass-panel border-r border-slate-200 dark:border-white/10 py-8 z-50 transition-all duration-300 ease-in-out group ${isSidebarPinned ? 'w-64' : 'w-20 hover:w-64'}`}>
                                <div class="px-6 mb-8 flex items-center gap-4 shrink-0 overflow-hidden">
                                    <div class="w-10 h-10 shrink-0 rounded-xl bg-primary/10 border border-primary/20 flex items-center justify-center shadow-lg">
                                        <span class="material-symbols-outlined text-primary text-xl">medical_services</span>
                                    </div>
                                    <div class={`transition-all duration-300 whitespace-nowrap overflow-hidden ${isSidebarPinned ? 'opacity-100 w-auto' : 'opacity-0 w-0 group-hover:opacity-100 group-hover:w-auto'}`}>
                                        <h1 class="font-bold text-lg text-slate-900 dark:text-white tracking-tighter font-display leading-tight">SANARE ULTRA</h1>
                                    </div>
                                    <button onClick={() => setIsSidebarPinned(!isSidebarPinned)} class={`ml-auto shrink-0 text-slate-400 hover:text-primary transition-colors ${isSidebarPinned ? 'block' : 'hidden group-hover:block'}`}>
                                        <span class="material-symbols-outlined text-[20px]">{isSidebarPinned ? 'push_pin' : 'menu'}</span>
                                    </button>
                                </div>
                                <nav class="flex-1 px-4 space-y-1.5 overflow-y-auto no-scrollbar text-left overflow-x-hidden">
                                    {[
                                        { id: "dashboard", icon: "terminal" },
                                        { id: "books", icon: "library_books" },
                                        { id: "Note", icon: "description" },
                                        { id: "Sud_An", icon: "history_edu" },
                                        { id: "Fresh_Sud_An", icon: "article" },
                                        { id: "Questionnaire", icon: "quiz" },
                                        { id: "folders", icon: "folder_shared" },
                                        { id: "calendar", icon: "calendar_today" }
                                    ].map(tab => (
                                        <button key={tab.id} onClick={() => setCurrentTab(tab.id)} class={`w-full flex items-center gap-3 p-3 rounded-xl transition-all whitespace-nowrap overflow-hidden ${currentTab === tab.id ? "bg-slate-100 dark:bg-white/10 border border-slate-200 dark:border-white/5 text-slate-900 dark:text-white font-bold" : "text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-50 dark:hover:bg-white/5"}`}>
                                            <span class="material-symbols-outlined shrink-0 text-[20px]">{tab.icon}</span> 
                                            <span class={`transition-all duration-300 ${isSidebarPinned ? 'opacity-100 w-auto' : 'opacity-0 w-0 group-hover:opacity-100 group-hover:w-auto'}`}>{TabNames[tab.id]}</span>
                                        </button>
                                    ))}
                                </nav>
                                <div class="px-4 mt-auto pt-4 border-t border-slate-200 dark:border-white/10 space-y-2 overflow-hidden">
                                    <button onClick={() => setIsDark(!isDark)} class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-white/5 text-slate-500 dark:text-slate-400 font-bold transition-all whitespace-nowrap overflow-hidden">
                                        <span class="material-symbols-outlined shrink-0">{isDark ? 'light_mode' : 'dark_mode'}</span>
                                        <span class={`transition-all duration-300 ${isSidebarPinned ? 'opacity-100 w-auto' : 'opacity-0 w-0 group-hover:opacity-100 group-hover:w-auto'}`}>{isDark ? 'Light Mode' : 'Dark Mode'}</span>
                                    </button>
                                    <button onClick={async () => { await coreClient.auth.signOut(); window.location.reload(); }} class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-red-50 dark:hover:bg-red-950/20 text-red-500 font-bold transition-all whitespace-nowrap overflow-hidden">
                                        <span class="material-symbols-outlined shrink-0">logout</span>
                                        <span class={`transition-all duration-300 ${isSidebarPinned ? 'opacity-100 w-auto' : 'opacity-0 w-0 group-hover:opacity-100 group-hover:w-auto'}`}>Log Out</span>
                                    </button>
                                </div>
                            </aside>

                            {/* CONTAINER CONTENT CANVAS CORE PANEL */}
                            <main class={`flex-1 flex flex-col relative min-h-screen transition-all duration-300 ease-in-out ${isSidebarPinned ? 'md:ml-64' : 'md:ml-20'}`}>
                                
                                {/* HEADER FILTERS STICKY ZONE */}
                                <header class="sticky top-0 z-40 flex flex-col w-full bg-slate-50/90 dark:bg-[#09090B]/90 glass-panel border-b border-slate-200 dark:border-white/10 shadow-sm">
                                    <div class="flex justify-between items-center px-6 py-4">
                                        <span class="font-bold text-slate-900 dark:text-white md:hidden font-display">SANARE ULTRA</span>
                                        <h2 class="hidden md:block font-bold text-lg font-display">{TabNames[currentTab]}</h2>
                                        
                                        {/* PROMINENT FILTERS (Easier to see on tabs that need them) */}
                                        {["Note", "Sud_An", "Fresh_Sud_An", "Questionnaire", "folders"].includes(currentTab) && (
                                            <div class="flex items-center gap-6">
                                                {/* Batch Segmented Control */}
                                                <div class="hidden sm:flex bg-slate-200/50 dark:bg-white/[0.03] p-1 rounded-xl border border-slate-300/50 dark:border-white/5">
                                                    {["Sanare", "Manus", "Vesties"].map(b => (
                                                        <button key={b} onClick={() => setSelectedBatch(b)} class={`px-4 py-1.5 rounded-lg text-sm font-semibold transition-all ${selectedBatch === b ? "bg-white dark:bg-white/10 text-slate-900 dark:text-white shadow-sm border border-slate-200 dark:border-white/10" : "text-slate-500 hover:text-slate-700 dark:hover:text-white"}`}>{b}</button>
                                                    ))}
                                                </div>
                                                {/* Semester Segmented Control */}
                                                <div class="flex bg-slate-200/50 dark:bg-white/[0.03] p-1 rounded-xl border border-slate-300/50 dark:border-white/5">
                                                    {["1st Semester", "2nd Semester"].map(s => (
                                                        <button key={s} onClick={() => setSelectedSemester(s)} class={`px-4 py-1.5 rounded-lg text-sm font-semibold transition-all ${selectedSemester === s ? "bg-primary text-white shadow-sm border border-primary/20" : "text-slate-500 hover:text-slate-700 dark:hover:text-white"}`}>{s === "1st Semester" ? "Sem 1" : "Sem 2"}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </header>

                                <div class="flex-1 w-full relative p-6 md:p-8 max-w-[1600px] mx-auto pb-32">
                                    
                                    {/* DASHBOARD SYSTEM LANDING NODES */}
                                    {currentTab === "dashboard" && (
                                        <div class="space-y-6 text-left max-w-4xl mx-auto">
                                            {/* FORCE ANNOUNCEMENT BOARD */}
                                            <div class="glass-panel p-6 border-l-4 border-l-primary shadow-sm dark:shadow-xl rounded-xl bg-white dark:bg-white/[0.02] border border-slate-200 dark:border-white/5">
                                                <div class="flex items-start gap-4">
                                                    <div class="p-3 bg-primary/10 rounded-xl text-primary flex items-center justify-center"><span class="material-symbols-outlined">campaign</span></div>
                                                    <div class="flex-1 space-y-1">
                                                        <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-1">
                                                            <h3 class="font-bold text-lg text-slate-900 dark:text-white">Latest Bulletin Notice</h3>
                                                            {announcement && <span class="text-xs font-mono text-slate-500">{announcement.date_posted}</span>}
                                                        </div>
                                                        <p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed mt-2">
                                                            {announcement ? announcement.announcement_text : "No active bulletin notices at this time. Check back later for updates."}
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="glass-panel p-6 shadow-sm dark:shadow-xl space-y-4 rounded-2xl bg-white dark:bg-white/[0.02] border border-slate-200 dark:border-white/5">
                                                <div class="flex items-center gap-2.5 border-b border-slate-100 dark:border-white/5 pb-4">
                                                    <span class="material-symbols-outlined text-primary">calendar_clock</span>
                                                    <h2 class="font-bold text-xl text-slate-900 dark:text-white tracking-tight">Weekly Timetable Schedule</h2>
                                                </div>
                                                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
                                                    {daysNames.map((day, idx) => {
                                                        const i = idx + 1;
                                                        const dayEvents = weeklySchedule.filter(item => item.day_of_week === i);
                                                        return (
                                                            <div key={day} class={`rounded-xl p-4 border ${i === currentDayInt ? 'bg-primary/5 border-primary/30 ring-1 ring-primary/20' : 'bg-slate-50 dark:bg-slate-900/40 border-slate-200 dark:border-white/5'} flex flex-col min-h-[140px]`}>
                                                                <h4 class={`text-xs uppercase tracking-wider ${i === currentDayInt ? 'text-primary font-bold' : 'text-slate-500 font-bold'}`}>{day}</h4>
                                                                {dayEvents.length === 0 ? (
                                                                    <p class="text-[11px] text-slate-400 italic pt-3">Clear Schedule</p>
                                                                ) : dayEvents.map((ev, eIdx) => (
                                                                    <div key={eIdx} class="border-t border-slate-200 dark:border-white/5 mt-2 pt-2 space-y-1">
                                                                        <p class="text-[11px] font-bold text-slate-700 dark:text-slate-200 whitespace-normal break-words leading-tight">{ev.event_title}</p>
                                                                        <p class="text-[9px] text-slate-500 font-mono">{ev.event_date}</p>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* MODULE: MEDICAL BOOKS MATRIX */}
                                    {currentTab === "books" && (
                                        <div class="text-left w-full h-full">
                                            {!activeSubject ? (
                                                <div class="w-full">
                                                    <div class="mb-10 text-left max-w-5xl mx-auto">
                                                        <h2 class="font-display text-3xl font-black text-slate-900 dark:text-white tracking-tight mb-2">Medical Books</h2>
                                                        <p class="text-slate-500 text-lg">Select a subject library to view resources.</p>
                                                    </div>
                                                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl mx-auto">
                                                        {Object.keys(groupedBooks).length === 0 ? <div class="col-span-full text-center text-sm text-slate-500 italic py-8">No library entries found.</div> : Object.keys(groupedBooks).sort().map(subj => (
                                                            <button key={subj} onClick={() => setActiveSubject(subj)} class="glass-panel bg-white dark:bg-white/[0.02] border border-slate-200 dark:border-white/5 shadow-sm rounded-2xl p-8 flex flex-col justify-between h-48 group relative overflow-hidden text-left w-full hover:border-primary/40 dark:hover:border-primary/40 transition-all hover:shadow-md hover:-translate-y-1">
                                                                <div class="relative z-10 flex justify-between items-start">
                                                                    <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary"><span class="material-symbols-outlined text-3xl">{getSubjectIcon(subj)}</span></div>
                                                                </div>
                                                                <div class="relative z-10 mt-auto">
                                                                    <h3 class="font-display text-xl text-slate-900 dark:text-white mb-1 font-bold tracking-tight group-hover:text-primary transition-colors">{subj}</h3>
                                                                    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">{groupedBooks[subj].length} Resources Available</p>
                                                                </div>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ) : (
                                                // INNER DRILL-DOWN SIDEBAR LAYOUT FOR BOOKS
                                                <div class="flex flex-col md:flex-row gap-8 w-full max-w-6xl mx-auto">
                                                    {/* Inner Sidebar: Subject List */}
                                                    <div class="w-full md:w-64 shrink-0 flex flex-col gap-2 sticky top-28 h-fit">
                                                        <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 pl-3 mb-2">Subjects</h3>
                                                        {Object.keys(groupedBooks).sort().map(subj => (
                                                            <button key={subj} onClick={() => setActiveSubject(subj)} class={`w-full text-left px-4 py-3 rounded-xl transition-all font-bold text-sm ${subj === activeSubject ? 'bg-primary text-white shadow-md' : 'hover:bg-slate-200 dark:hover:bg-white/10 text-slate-600 dark:text-slate-400'}`}>
                                                                {subj}
                                                            </button>
                                                        ))}
                                                    </div>
                                                    
                                                    {/* Right Panel: Content Grid */}
                                                    <div class="flex-1 space-y-6">
                                                        <h1 class="font-display text-4xl font-black text-slate-900 dark:text-white tracking-tight">{activeSubject} References</h1>
                                                        <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                                            {groupedBooks[activeSubject].map((b, idx) => {
                                                                const routes = resolveDriveLinks(b.drive_link);
                                                                return (
                                                                    <div key={idx} class="group flex items-center justify-between p-5 rounded-2xl bg-white dark:bg-white/[0.02] border border-slate-200 dark:border-white/5 hover:border-slate-300 dark:hover:border-white/10 shadow-sm transition-all h-full">
                                                                        <div class="flex items-center gap-4 w-[75%]">
                                                                            <div class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-white/5 flex items-center justify-center border border-slate-200 dark:border-white/5 shrink-0"><span class="material-symbols-outlined text-slate-500 text-[20px]">menu_book</span></div>
                                                                            <span class="text-sm text-slate-900 dark:text-white font-bold whitespace-normal break-words leading-snug">{b.book_name}</span>
                                                                        </div>
                                                                        <div class="flex items-center gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity shrink-0">
                                                                            <a href={routes.preview} target="_blank" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-white/5 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-primary/20 hover:text-primary transition-colors"><span class="material-symbols-outlined text-[18px]">visibility</span></a>
                                                                            <a href={routes.download} target="_blank" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-white/5 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-emerald-500/20 hover:text-emerald-500 transition-colors"><span class="material-symbols-outlined text-[18px]">download</span></a>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* MODULE: ACADEMIC CORE DATA DIRECTORIES (NOTES, RECALLS) */}
                                    {["Note", "Sud_An", "Fresh_Sud_An", "Questionnaire"].includes(currentTab) && (
                                        <div class="text-left w-full h-full">
                                            
                                            {/* TIER 1: SUBJECT GRID PORTALS */}
                                            {!activeSubject ? (
                                                <div class="w-full">
                                                    <div class="mb-10 text-left max-w-5xl mx-auto">
                                                        <h2 class="font-display text-3xl font-black text-slate-900 dark:text-white tracking-tight mb-2">{TabNames[currentTab]}</h2>
                                                        <p class="text-slate-500 text-lg">Select a subject to view available modules.</p>
                                                    </div>
                                                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl mx-auto">
                                                        {Object.keys(groupedResourcesBySubject).length === 0 ? <div class="col-span-full text-center text-sm text-slate-500 italic py-12 border border-dashed border-slate-300 dark:border-white/10 rounded-2xl">No asset nodes loaded for {selectedBatch} • {selectedSemester}.</div> : Object.keys(groupedResourcesBySubject).sort().map(subj => (
                                                            <button key={subj} onClick={() => setActiveSubject(subj)} class="glass-panel bg-white dark:bg-white/[0.02] border border-slate-200 dark:border-white/5 shadow-sm rounded-2xl p-8 flex flex-col justify-between h-48 group relative overflow-hidden text-left w-full hover:border-primary/40 dark:hover:border-primary/40 transition-all hover:shadow-md hover:-translate-y-1">
                                                                <div class="relative z-10 flex justify-between items-start">
                                                                    <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary"><span class="material-symbols-outlined text-3xl">{getSubjectIcon(subj)}</span></div>
                                                                </div>
                                                                <div class="relative z-10 mt-auto">
                                                                    <h3 class="font-display text-xl text-slate-900 dark:text-white mb-1 font-bold tracking-tight group-hover:text-primary transition-colors">{subj}</h3>
                                                                    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">{groupedResourcesBySubject[subj].length} Files Indexed</p>
                                                                </div>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ) : (
                                                
                                                /* TIER 2: INNER SIDEBAR & TREE-VIEW BLOCKS (UX UPGRADE) */
                                                <div class="flex flex-col md:flex-row gap-8 w-full max-w-6xl mx-auto">
                                                    
                                                    {/* Left: Inner Sidebar for Subject Transfer */}
                                                    <div class="w-full md:w-64 shrink-0 flex flex-col gap-2 sticky top-28 h-fit z-10">
                                                        <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 pl-3 mb-2">Subjects</h3>
                                                        {Object.keys(groupedResourcesBySubject).sort().map(subj => (
                                                            <button key={subj} onClick={() => setActiveSubject(subj)} class={`w-full text-left px-4 py-3 rounded-xl transition-all font-bold text-sm ${subj === activeSubject ? 'bg-primary text-white shadow-md' : 'hover:bg-slate-200 dark:hover:bg-white/10 text-slate-600 dark:text-slate-400'}`}>
                                                                {subj}
                                                            </button>
                                                        ))}
                                                    </div>

                                                    {/* Right: Master Block Timeline Tree View */}
                                                    <div class="flex-1 max-w-4xl relative">
                                                        <h1 class="font-display text-4xl font-black text-slate-900 dark:text-white tracking-tight mb-8">{activeSubject}</h1>
                                                        
                                                        <div class="relative tree-line space-y-6 pb-12">
                                                            {Object.keys(activeSubjectMasterBlocks).sort().map((masterBlock, mIdx) => {
                                                                const isExpanded = expandedBlocks[masterBlock];
                                                                const isSingleRedirect = ["Fresh_Sud_An", "Questionnaire"].includes(currentTab);
                                                                
                                                                return (
                                                                    <div key={masterBlock} class="relative pl-10 md:pl-12">
                                                                        {/* The Timeline Dot */}
                                                                        <div class="absolute left-[9px] md:left-[9px] top-6 w-3.5 h-3.5 rounded-full bg-primary ring-4 ring-slate-50 dark:ring-[#09090B] z-10"></div>
                                                                        
                                                                        {/* Block Accordion Card */}
                                                                        <div class="bg-white dark:bg-[#131315] border border-slate-200 dark:border-white/10 rounded-2xl shadow-sm overflow-hidden transition-all duration-300">
                                                                            <div onClick={() => toggleBlock(masterBlock)} class="flex justify-between items-center p-6 cursor-pointer hover:bg-slate-50 dark:hover:bg-white/[0.02] select-none">
                                                                                <div class="flex items-center gap-4">
                                                                                    <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary"><span class="material-symbols-outlined text-[24px]">{isExpanded ? 'folder_open' : 'folder'}</span></div>
                                                                                    <h2 class="font-display text-2xl text-slate-900 dark:text-white font-bold">{masterBlock}</h2>
                                                                                </div>
                                                                                <span class={`material-symbols-outlined text-slate-400 transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`}>expand_more</span>
                                                                            </div>
                                                                            
                                                                            {/* Sub-Blocks & Wrapped Files */}
                                                                            {isExpanded && (
                                                                                <div class="p-6 pt-2 space-y-8 bg-slate-50/50 dark:bg-black/20 border-t border-slate-100 dark:border-white/5">
                                                                                    {Object.keys(activeSubjectMasterBlocks[masterBlock]).sort().map(subBlock => (
                                                                                        <div key={subBlock} class="space-y-4">
                                                                                            {subBlock !== masterBlock && (
                                                                                                <h3 class="text-[11px] font-black uppercase tracking-widest text-primary flex items-center gap-3">
                                                                                                    <span class="w-1.5 h-1.5 rounded-full bg-primary"></span>
                                                                                                    {subBlock}
                                                                                                </h3>
                                                                                            )}
                                                                                            <div class="flex flex-col gap-3">
                                                                                                {activeSubjectMasterBlocks[masterBlock][subBlock].map((item, idx) => {
                                                                                                    const routes = resolveDriveLinks(item.file_link);
                                                                                                    return isSingleRedirect ? (
                                                                                                        <div key={idx} class="group flex flex-col md:flex-row md:items-center justify-between p-4 rounded-xl bg-white dark:bg-[#131315] border border-slate-200 dark:border-white/10 hover:border-primary/30 transition-all shadow-sm gap-4">
                                                                                                            <div class="flex items-start gap-4 w-full md:w-[75%]">
                                                                                                                <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary shrink-0 mt-0.5"><span class="material-symbols-outlined text-[20px]">terminal</span></div>
                                                                                                                <span class="text-[15px] text-slate-900 dark:text-white font-bold whitespace-normal break-words leading-snug pt-1">{item.topic}</span>
                                                                                                            </div>
                                                                                                            <a href={item.file_link} target="_blank" class="w-full md:w-auto bg-primary text-white rounded-lg px-5 py-2.5 flex items-center justify-center gap-2 hover:opacity-90 font-bold shrink-0 shadow-md">
                                                                                                                <span>Open Link</span><span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                                                                                                            </a>
                                                                                                        </div>
                                                                                                    ) : (
                                                                                                        <div key={idx} class="group flex flex-col md:flex-row md:items-center justify-between p-4 rounded-xl bg-white dark:bg-[#131315] border border-slate-200 dark:border-white/10 hover:border-slate-300 dark:hover:border-white/20 transition-all shadow-sm gap-4">
                                                                                                            <div class="flex items-start gap-4 w-full md:w-[75%]">
                                                                                                                <div class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-white/5 flex items-center justify-center text-slate-500 shrink-0 mt-0.5"><span class="material-symbols-outlined text-[20px]">description</span></div>
                                                                                                                <span class="text-[15px] text-slate-900 dark:text-white font-bold whitespace-normal break-words leading-snug pt-1">{item.topic}</span>
                                                                                                            </div>
                                                                                                            <div class="flex items-center gap-2 w-full md:w-auto shrink-0 justify-end">
                                                                                                                <a href={routes.preview} target="_blank" class="flex-1 md:flex-none w-auto md:w-10 h-10 rounded-lg md:rounded-full bg-slate-100 dark:bg-white/5 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-primary/20 hover:text-primary transition-colors"><span class="material-symbols-outlined text-[18px]">visibility</span></a>
                                                                                                                <a href={routes.download} target="_blank" class="flex-1 md:flex-none w-auto md:w-10 h-10 rounded-lg md:rounded-full bg-slate-100 dark:bg-white/5 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-emerald-500/20 hover:text-emerald-500 transition-colors"><span class="material-symbols-outlined text-[18px]">download</span></a>
                                                                                                            </div>
                                                                                                        </div>
                                                                                                    );
                                                                                                })}
                                                                                            </div>
                                                                                        </div>
                                                                                    ))}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* MODULE: BATCH DIRECTORY PARENT ROOT FOLDERS */}
                                    {currentTab === "folders" && (
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left max-w-4xl mx-auto">
                                            {batchFolders.length === 0 ? <div class="col-span-full text-center text-sm text-slate-500 italic py-8">No shared connection matrices generated.</div> : batchFolders.filter(f => f.batch === selectedBatch && f.semester === selectedSemester).map((f, idx) => (
                                                <a key={idx} href={f.folder_link} target="_blank" class="p-6 bg-white dark:bg-white/[0.02] border border-slate-200 dark:border-white/10 shadow-sm rounded-2xl flex items-center justify-between group transition-all hover:-translate-y-1 hover:shadow-md hover:border-primary/30">
                                                    <div class="space-y-2 max-w-[85%]">
                                                        <div class="flex items-center gap-2 text-[10px] font-bold tracking-widest uppercase text-slate-400">
                                                            <span>{f.batch}</span><span>•</span><span>{f.semester}</span><span>•</span><span class="text-primary">{f.category}</span>
                                                        </div>
                                                        <h4 class="text-lg font-bold text-slate-900 dark:text-white whitespace-normal break-words leading-tight group-hover:text-primary transition-colors">{f.topic}</h4>
                                                        <p class="text-sm text-slate-500 font-medium">{f.subject}</p>
                                                    </div>
                                                    <span class="material-symbols-outlined text-slate-300 dark:text-slate-600 group-hover:text-primary text-3xl transition-colors">folder_open</span>
                                                </a>
                                            ))}
                                        </div>
                                    )}

                                    {/* MODULE: ROTATIONS CALENDAR VIEW */}
                                    {currentTab === "calendar" && (
                                        <div class="space-y-4 text-left h-full flex flex-col max-w-5xl mx-auto">
                                            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 p-2 rounded-2xl h-[65vh] min-h-[450px] flex-1 shadow-sm">
                                                <iframe src={configMap.calendar_embed_url || "https://calendar.google.com/calendar/embed?src=en.philippines%23holiday%40group.v.calendar.google.com"} 
                                                        style={{border: 0, borderRadius: "0.75rem"}} class="w-full h-full dark:opacity-75 dark:invert dark:contrast-125" frameborder="0" scrolling="no"></iframe>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </main>

                            {/* MOBILE RESPONSIVE SYSTEM NAVIGATION DOCK CONTROLLER STRIP */}
                            <nav class="md:hidden fixed bottom-0 left-0 w-full h-16 bg-white/90 dark:bg-[#09090B]/90 backdrop-blur-md border-t border-slate-200 dark:border-white/10 z-50 px-1 flex justify-around items-center">
                                <button onClick={() => setCurrentTab("dashboard")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "dashboard" ? "text-primary font-bold" : "text-slate-500"}`}><span class="material-symbols-outlined text-[20px] mb-0.5">terminal</span><span class="text-[9px]">Overview</span></button>
                                <button onClick={() => setCurrentTab("books")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "books" ? "text-primary font-bold" : "text-slate-500"}`}><span class="material-symbols-outlined text-[20px] mb-0.5">library_books</span><span class="text-[9px]">Books</span></button>
                                <button onClick={() => setCurrentTab("Note")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "Note" ? "text-primary font-bold" : "text-slate-500"}`}><span class="material-symbols-outlined text-[20px] mb-0.5">description</span><span class="text-[9px]">Notes</span></button>
                                <button onClick={() => setCurrentTab("Sud_An")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "Sud_An" ? "text-primary font-bold" : "text-slate-500"}`}><span class="material-symbols-outlined text-[20px] mb-0.5">history_edu</span><span class="text-[9px]">Recalls</span></button>
                                <button onClick={() => setIsDark(!isDark)} class="flex flex-col items-center justify-center p-1 text-slate-500"><span class="material-symbols-outlined text-[20px] mb-0.5">{isDark ? 'light_mode' : 'dark_mode'}</span><span class="text-[9px]">Theme</span></button>
                            </nav>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
