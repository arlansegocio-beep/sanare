<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SU Archives</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Premium Fontshare Typography System -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500&f[]=geist@400,500,600,700&display=swap" rel="stylesheet">
    <!-- Premium Phosphor Vector Icon Ecosystem -->
    <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2"></script>
    <!-- Supabase Core System Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#b4c5ff", "primary-fixed": "#dbe1ff" },
                    fontFamily: { 
                        sans: ["Geist", "Inter", "sans-serif"], 
                        display: ["Satoshi", "Manrope", "sans-serif"], 
                        mono: ["JetBrains Mono", "monospace"] 
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        body {
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-image 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .global-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Ultra Smooth Dropdown Accordion Slide Motion */
        .accordion-content {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-[#f8f9fa] dark:bg-[#050508] text-gray-900 dark:text-white min-h-screen flex antialiased selection:bg-blue-500/30 selection:text-blue-400">

    <div id="root" class="w-full flex min-h-screen"></div>

    <!-- Core Runtime Compilers -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Engine Infrastructure Script -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = "https://cvzwkifoexnjbtuvwxjr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__VapXVAabPKcv6lXJ8Agag_1nxbP4ay";
        const coreClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- PHASE 1: ADMIN WHITELIST CHECKER ---
        // Change or add the Google emails of authorized officers here
        const ADMIN_WHITELIST = [
            "arlan.segocio@gmail.com",
        ];

        function App() {
            const [currentPage, setCurrentPage] = useState("auth"); 
            const [currentTab, setCurrentTab] = useState("dashboard"); 
            const [authError, setAuthError] = useState("");
            const [isVerifying, setIsVerifying] = useState(false);
            
            // Layout UX State Controls
            const [isDark, setIsDark] = useState(true);
            const [toasts, setToasts] = useState([]);
            const [userFirstName, setUserFirstName] = useState("Scholar");
            const [currentUserEmail, setCurrentUserEmail] = useState("");
            const [searchQuery, setSearchQuery] = useState("");
            const [showScrollTop, setShowScrollTop] = useState(false);

            // Cloud Database States
            const [announcement, setAnnouncement] = useState(null);
            const [weeklySchedule, setWeeklySchedule] = useState([]);
            const [books, setBooks] = useState([]);
            const [academicResources, setAcademicResources] = useState([]);
            const [batchFolders, setBatchFolders] = useState([]);
            const [configMap, setConfigMap] = useState({});

            // Layout Filter Pointers
            const [selectedBatch, setSelectedBatch] = useState("Sanare");
            const [selectedSemester, setSelectedSemester] = useState("1st Semester");

            // Drill Down Interactive Nodes
            const [activeSubject, setActiveSubject] = useState(null);
            const [expandedBlocks, setExpandedBlocks] = useState({});

            // --- ADMIN INPUT PANEL STATES ---
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [isPublishing, setIsPublishing] = useState(false);
            
            // Form 1: Study Asset State
            const [assetForm, setAssetForm] = useState({
                resource_type: "Note",
                batch: "Sanare",
                semester: "1st Semester",
                subject: "Anatomy",
                block: "Block 1",
                topic: "",
                file_link: ""
            });

            // Form 2: Bulletin State (Configured to exact announcement columns)
            const [bulletinForm, setBulletinForm] = useState({
                title: "Class Notice",
                announcement_text: ""
            });

            // Form 3: Class Schedule State
            const [scheduleForm, setScheduleForm] = useState({
                day_of_week: 1,
                event_title: "",
                event_date: ""
            });

            // check if current user is Whitelisted as an admin officer
            const isUserAdminOfficer = useMemo(() => {
                if (!currentUserEmail) return false;
                return ADMIN_WHITELIST.includes(currentUserEmail.toLowerCase().trim());
            }, [currentUserEmail]);

            useEffect(() => {
                const body = document.body;
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    body.style.backgroundColor = "#050508";
                    body.style.backgroundImage = "radial-gradient(circle at top right, rgba(59, 130, 246, 0.08), transparent 40%), radial-gradient(circle at bottom left, rgba(30, 64, 175, 0.18), transparent 45%), radial-gradient(circle at 15% 50%, rgba(30, 64, 175, 0.12), transparent 25%), radial-gradient(circle at 85% 30%, rgba(30, 64, 175, 0.12), transparent 25%)";
                } else {
                    document.documentElement.classList.remove('dark');
                    body.style.backgroundColor = "#f8f9fa";
                    body.style.backgroundImage = "radial-gradient(circle at top left, rgba(59, 130, 246, 0.08), transparent 50%), radial-gradient(circle at 85% 20%, rgba(37, 99, 235, 0.04), transparent 40%), radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.03), transparent 45%)";
                }
            }, [isDark]);

            // Quick Scroll Observer
            useEffect(() => {
                const handleScroll = () => {
                    if (window.scrollY > 300) setShowScrollTop(true);
                    else setShowScrollTop(false);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                setActiveSubject(null);
                setExpandedBlocks({});
                setSearchQuery("");
            }, [currentTab]);

            useEffect(() => {
                const { data: { subscription } } = coreClient.auth.onAuthStateChange(async (event, session) => {
                    if (session) {
                        setIsVerifying(true);
                        const loggedInEmail = session.user?.email;
                        setCurrentUserEmail(loggedInEmail || "");

                        const { data: whitelistCheck, error: whitelistError } = await coreClient
                            .from('allowed_emails')
                            .select('*')
                            .eq('email', loggedInEmail);

                        if (whitelistError || !whitelistCheck || whitelistCheck.length === 0) {
                            setAuthError("Access Denied: Your Gmail account is not whitelisted.");
                            setIsVerifying(false);
                            setCurrentPage("auth");
                            await coreClient.auth.signOut();
                            return;
                        }

                        const profileRow = whitelistCheck[0];
                        const designatedName = profileRow.first_name || profileRow.name || session.user?.user_metadata?.full_name || "Scholar";
                        setUserFirstName(designatedName.split(' ')[0].trim());

                        setAuthError("");
                        setIsVerifying(false);
                        setCurrentPage("dashboard");
                        
                        fetchConfig();
                        fetchAnnouncements();
                        fetchTimetable();
                        fetchBooks();
                        fetchAcademicResources();
                        fetchBatchFolders();
                    } else {
                        setCurrentPage("auth");
                    }
                });
                return () => subscription.unsubscribe();
            }, []);

            async function fetchConfig() {
                const { data } = await coreClient.from('system_config').select('*');
                if (data) {
                    const mapped = {};
                    data.forEach(item => mapped[item.key] = item.value);
                    setConfigMap(mapped);
                }
            }
            
            // fetch latest singular announcement using correct table and sorted created_at order
            async function fetchAnnouncements() {
                const { data } = await coreClient
                    .from('announcement')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(1);
                
                if (data && data.length > 0) {
                    setAnnouncement(data[0]);
                } else {
                    setAnnouncement(null);
                }
            }

            async function fetchTimetable() {
                const { data } = await coreClient.from('weekly_schedule').select('*').order('day_of_week', { ascending: true });
                if (data) setWeeklySchedule(data);
            }
            async function fetchBooks() {
                const { data } = await coreClient.from('medical_books').select('*').order('book_name', { ascending: true });
                if (data) setBooks(data);
            }
            async function fetchAcademicResources() {
                const { data } = await coreClient.from('academic_resources').select('*').order('topic', { ascending: true });
                if (data) setAcademicResources(data);
            }
            async function fetchBatchFolders() {
                const { data } = await coreClient.from('batch_folders').select('*').order('topic', { ascending: true });
                if (data) setBatchFolders(data);
            }

            const triggerSystemToastAlert = (topicTitle) => {
                const hashId = Date.now();
                setToasts(prev => [...prev, { id: hashId, title: topicTitle }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(toast => toast.id !== hashId));
                }, 4000);
            };

            const resolveDriveLinks = (rawUrl) => {
                if (!rawUrl) return { preview: '#', download: '#' };
                const str = String(rawUrl).trim();
                let fileId = '';
                if (str.includes('/d/')) { fileId = str.split('/d/')[1].split('/')[0]; }
                else if (str.includes('id=')) { fileId = str.split('id=')[1].split('&')[0]; }

                if (fileId) {
                    if (str.includes('docs.google.com/document')) {
                        return { preview: `https://docs.google.com/document/d/${fileId}/preview`, download: `https://docs.google.com/document/d/${fileId}/export?format=pdf` };
                    }
                    return { preview: `https://drive.google.com/file/d/${fileId}/preview`, download: `https://drive.google.com/uc?export=download&id=${fileId}` };
                }
                return { preview: str, download: str };
            };

            const toggleBlock = (blockName) => {
                setExpandedBlocks(prev => ({ ...prev, [blockName]: !prev[blockName] }));
            };

            const getSubjectIconData = (subj) => {
                const clean = String(subj).toLowerCase();
                let icon = 'ph-folder-open';
                let colorClass = 'text-blue-600 bg-blue-50 dark:text-blue-400 dark:bg-blue-950/30';
                
                if (clean.includes('anatomy')) {
                    icon = 'ph-skull';
                    colorClass = 'text-rose-600 bg-rose-50 dark:text-rose-400 dark:bg-rose-950/30';
                } else if (clean.includes('pathology') || clean.includes('path')) {
                    icon = 'ph-microscope';
                    colorClass = 'text-purple-600 bg-purple-50 dark:text-purple-400 dark:bg-purple-950/30';
                } else if (clean.includes('pharmaco') || clean.includes('pharma')) {
                    icon = 'ph-pill';
                    colorClass = 'text-emerald-600 bg-emerald-50 dark:text-emerald-400 dark:bg-emerald-950/30';
                } else if (clean.includes('histology')) {
                    icon = 'ph-layers';
                    colorClass = 'text-amber-600 bg-amber-50 dark:text-amber-400 dark:bg-amber-950/30';
                } else if (clean.includes('biochem')) {
                    icon = 'ph-atom';
                    colorClass = 'text-cyan-600 bg-cyan-50 dark:text-cyan-400 dark:bg-cyan-950/30';
                } else if (clean.includes('micro') || clean.includes('para')) {
                    icon = 'ph-virus';
                    colorClass = 'text-orange-600 bg-orange-50 dark:text-orange-400 dark:bg-orange-950/30';
                } else if (clean.includes('fcm') || clean.includes('family') || clean.includes('community')) {
                    icon = 'ph-users';
                    colorClass = 'text-sky-600 bg-sky-50 dark:text-sky-400 dark:bg-sky-950/30';
                } else if (clean.includes('medicine')) {
                    icon = 'ph-heartbeat';
                    colorClass = 'text-blue-600 bg-blue-50 dark:text-blue-400 dark:bg-blue-950/30';
                } else if (clean.includes('pediatrics') || clean.includes('pedia')) {
                    icon = 'ph-baby';
                    colorClass = 'text-pink-600 bg-pink-50 dark:text-pink-400 dark:bg-pink-950/30';
                } else if (clean.includes('surgery')) {
                    icon = 'ph-scissors';
                    colorClass = 'text-red-600 bg-red-50 dark:text-red-400 dark:bg-red-950/30';
                } else if (clean.includes('ethics')) {
                    icon = 'ph-scales';
                    colorClass = 'text-slate-600 bg-slate-50 dark:text-slate-400 dark:bg-slate-950/30';
                } else if (clean.includes('epidemiology') || clean.includes('research') || clean.includes('come')) {
                    icon = 'ph-chart-bar';
                    colorClass = 'text-indigo-600 bg-indigo-50 dark:text-indigo-400 dark:bg-indigo-950/30';
                } else if (clean.includes('ob')) {
                    icon = 'ph-gender-female';
                    colorClass = 'text-fuchsia-600 bg-fuchsia-50 dark:text-fuchsia-400 dark:bg-fuchsia-950/30';
                } else if (clean.includes('psychiatry') || clean.includes('psych')) {
                    icon = 'ph-brain';
                    colorClass = 'text-teal-600 bg-teal-50 dark:text-teal-400 dark:bg-teal-950/30';
                } else if (clean.includes('quiz') || clean.includes('exam')) {
                    icon = 'ph-lightning';
                    colorClass = 'text-yellow-600 bg-yellow-50 dark:text-yellow-400 dark:bg-yellow-950/30';
                }
                
                return { icon, colorClass };
            };

            const renderFileBadge = (typeString, topicString) => {
                const cleanType = String(typeString).toLowerCase();
                const cleanTopic = String(topicString).toLowerCase();
                if (cleanType === "questionnaire" || cleanTopic.includes("quiz") || cleanTopic.includes("exam")) {
                    return <span class="text-[9px] font-black uppercase tracking-wider px-2 py-0.5 rounded bg-amber-500/10 text-amber-500 border border-amber-500/20 shrink-0 font-mono">QUIZ</span>;
                }
                if (cleanType === "note" || cleanTopic.includes("note") || cleanTopic.includes("lecture") || cleanTopic.includes("trans")) {
                    return <span class="text-[9px] font-black uppercase tracking-wider px-2 py-0.5 rounded bg-blue-500/10 text-blue-400 border border-blue-500/20 shrink-0 font-mono">NOTE</span>;
                }
                return <span class="text-[9px] font-black uppercase tracking-wider px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 shrink-0 font-mono">RECALL</span>;
            };

            // Format UTC timestamps nicely for announcements display
            const formatPostedDate = (timestamp) => {
                if (!timestamp) return "";
                try {
                    const date = new Date(timestamp);
                    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } catch (e) {
                    return "";
                }
            };

            const groupedBooks = useMemo(() => {
                const map = {};
                books.forEach(b => {
                    if(!map[b.subject]) map[b.subject] = [];
                    map[b.subject].push(b);
                });
                return map;
            }, [books]);

            const filteredResources = useMemo(() => {
                return academicResources.filter(r => r.resource_type === currentTab && r.batch === selectedBatch && r.semester === selectedSemester);
            }, [academicResources, currentTab, selectedBatch, selectedSemester]);

            const groupedResourcesBySubject = useMemo(() => {
                const map = {};
                filteredResources.forEach(r => {
                    if(!map[r.subject]) map[r.subject] = [];
                    map[r.subject].push(r);
                });
                return map;
            }, [filteredResources]);

            const searchedDeepFiles = useMemo(() => {
                if (!searchQuery.trim()) return [];
                return filteredResources.filter(item => item.topic.toLowerCase().includes(searchQuery.toLowerCase().trim()));
            }, [filteredResources, searchQuery]);

            const searchedDeepBooks = useMemo(() => {
                if (!searchQuery.trim()) return [];
                return books.filter(b => b.book_name.toLowerCase().includes(searchQuery.toLowerCase().trim()));
            }, [books, searchQuery]);

            const activeSubjectMasterBlocks = useMemo(() => {
                if (!activeSubject) return {};
                const items = groupedResourcesBySubject[activeSubject] || [];
                const map = {};
                
                items.forEach(item => {
                    let master = item.block;
                    const match = String(item.block).match(/Block\s+(\d+)/i);
                    if (match) master = `Block ${match[1]}`;
                    
                    if (!map[master]) map[master] = {};
                    let sub = item.block;
                    if (!map[master][sub]) map[master][sub] = [];
                    map[master][sub].push(item);
                });
                return map;
            }, [activeSubject, groupedResourcesBySubject]);

            const daysNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
            const currentDayInt = new Date().getDay() === 0 ? 7 : new Date().getDay();

            const currentActiveSpotlightEvent = useMemo(() => {
                const itemsForToday = weeklySchedule.filter(item => item.day_of_week === currentDayInt);
                if (itemsForToday.length > 0) return itemsForToday[0]; 
                return null;
            }, [weeklySchedule, currentDayInt]);

            const TabNames = {
                dashboard: "Overview",
                books: "Medical Books",
                Note: "Lecture Notes",
                Sud_An: "Recalls Archives",
                Fresh_Sud_An: "New Recalls",
                Questionnaire: "Interactive Quizzes",
                folders: "Batch Folders",
                calendar: "School Calendar"
            };

            const handlePublishAsset = async (e) => {
                e.preventDefault();
                if (!assetForm.topic || !assetForm.file_link) {
                    triggerSystemToastAlert("Error: Please provide a topic title and a connection link.");
                    return;
                }
                setIsPublishing(true);
                try {
                    const payload = {
                        resource_type: assetForm.resource_type,
                        batch: assetForm.batch,
                        semester: assetForm.semester,
                        subject: assetForm.subject,
                        block: assetForm.block,
                        topic: assetForm.topic.trim(),
                        file_link: assetForm.file_link.trim()
                    };

                    const { error } = await coreClient.from('academic_resources').insert([payload]);
                    if (error) throw error;

                    triggerSystemToastAlert(`${assetForm.topic} uploaded successfully!`);
                    setAssetForm(prev => ({ ...prev, topic: "", file_link: "" }));
                    await fetchAcademicResources();
                } catch (err) {
                    triggerSystemToastAlert(`Upload error: ${err.message}`);
                } finally {
                    setIsPublishing(false);
                }
            };

            // publish bulletin directly using correct singular table name and content schema parameters
            const handlePublishBulletin = async (e) => {
                e.preventDefault();
                if (!bulletinForm.announcement_text) {
                    triggerSystemToastAlert("Error: Please write the announcement text first.");
                    return;
                }
                setIsPublishing(true);
                try {
                    const payload = {
                        title: bulletinForm.title.trim() || "Class Notice",
                        content: bulletinForm.announcement_text.trim(),
                        is_high_priority: true
                    };

                    const { error } = await coreClient.from('announcement').insert([payload]);
                    if (error) throw error;

                    triggerSystemToastAlert("Latest bulletin announcement published live!");
                    setBulletinForm({ title: "Class Notice", announcement_text: "" });
                    await fetchAnnouncements();
                } catch (err) {
                    triggerSystemToastAlert(`Database error: ${err.message}`);
                } finally {
                    setIsPublishing(false);
                }
            };

            const handlePublishSchedule = async (e) => {
                e.preventDefault();
                if (!scheduleForm.event_title || !scheduleForm.event_date) {
                    triggerSystemToastAlert("Error: Please enter class title and hours.");
                    return;
                }
                setIsPublishing(true);
                try {
                    const payload = {
                        day_of_week: parseInt(scheduleForm.day_of_week),
                        event_title: scheduleForm.event_title.trim(),
                        event_date: scheduleForm.event_date.trim()
                    };

                    const { error } = await coreClient.from('weekly_schedule').insert([payload]);
                    if (error) throw error;

                    triggerSystemToastAlert(`Scheduled event '${scheduleForm.event_title}' is now active!`);
                    setScheduleForm({ day_of_week: 1, event_title: "", event_date: "" });
                    await fetchTimetable();
                } catch (err) {
                    triggerSystemToastAlert(`Scheduling error: ${err.message}`);
                } finally {
                    setIsPublishing(false);
                }
            };

            return (
                <div class="w-full flex min-h-screen overflow-x-hidden relative font-sans">
                    
                    {/* FLOATING QUICK-RETURN ANCHOR BUTTON */}
                    {showScrollTop && (
                        <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} class="fixed bottom-20 md:bottom-8 right-6 z-40 w-10 h-10 rounded-full bg-blue-600 hover:bg-blue-500 text-white flex items-center justify-center shadow-lg transition-all transform hover:scale-105 active:scale-95 animate-fade-in">
                            <i class="ph ph-arrow-up text-lg font-bold"></i>
                        </button>
                    )}

                    {/* APP HUD ALERT MESSAGING OVERLAY LAYER */}
                    <div class="fixed bottom-20 md:bottom-6 right-6 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none">
                        {toasts.map(toast => (
                            <div key={toast.id} class="pointer-events-auto bg-white/90 dark:bg-[#121318]/95 glass-panel border border-emerald-500/30 dark:border-emerald-500/20 shadow-xl p-4 rounded-[20px] flex items-start gap-3 animate-slide-up text-left shadow-[0_10px_30px_rgba(0,0,0,0.15)]">
                                <div class="p-1 bg-emerald-500/10 rounded-lg text-emerald-500 flex items-center justify-center shrink-0 mt-0.5">
                                    <i class="ph ph-check-circle text-sm font-bold"></i>
                                </div>
                                <div class="flex-1 overflow-hidden">
                                    <h4 class="text-xs font-bold text-gray-900 dark:text-white font-display">System Action Processed</h4>
                                    <p class="text-[11px] text-gray-500 dark:text-gray-400 font-medium leading-tight mt-1 whitespace-normal break-words">{toast.title}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* GATE LOGIN CORE PANEL */}
                    {currentPage === "auth" && (
                        <div class="flex-1 min-h-screen flex flex-col items-center justify-center px-4 relative bg-[#050508] text-white overflow-hidden selection:bg-blue-500/30 selection:text-blue-400">
                            <div class="absolute inset-0 z-0 pointer-events-none">
                                <div class="absolute top-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-blue-600/15 blur-[120px]"></div>
                                <div class="absolute bottom-[-10%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-blue-800/20 blur-[140px]"></div>
                            </div>
                            
                            <div class="relative z-10 max-w-3xl w-full text-center space-y-12 px-6 py-12">
                                <div class="space-y-4">
                                    <h1 class="text-6xl md:text-8xl font-black font-display tracking-tighter leading-none bg-gradient-to-b from-white via-slate-100 to-blue-500 bg-clip-text text-transparent drop-shadow-sm select-none animate-fade-in">
                                        SU ARCHIVES
                                    </h1>
                                </div>

                                <div class="max-w-md mx-auto p-8 rounded-[32px] bg-white/[0.02] border border-white/5 glass-panel shadow-[0_30px_100px_rgba(0,0,0,0.8)] backdrop-blur-3xl space-y-4">
                                    <button onClick={async () => { setAuthError(""); const { error } = await coreClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } }); if (error) setAuthError(error.message); }} disabled={isVerifying} class="w-full py-4 px-6 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold rounded-[16px] transition-all flex items-center justify-center space-x-3 shadow-lg shadow-blue-600/20 group hover:scale-[1.02] active:scale-[0.98]">
                                        <i class="ph ph-google-logo text-lg group-hover:rotate-12 global-transition"></i>
                                        <span>Authorize via Google Account</span>
                                    </button>
                                    
                                    {authError && <div class="text-xs text-rose-400 bg-rose-500/10 border border-rose-500/20 py-2 px-3 rounded-[14px]">{authError}</div>}
                                </div>
                            </div>
                        </div>
                    )}

                                                                                                    {!isLastBlockElement && <div class="absolute left-[21px] top-6 bottom-[-20px] w-0.5 bg-gray-200 dark:bg-white/15 global-transition"></div>}
                                                                                                    <div class="absolute left-[16px] top-[21px] w-2.5 h-2.5 rounded-full bg-blue-600 ring-4 ring-[#f8f9fa] dark:ring-[#050508] global-transition group-hover/block:scale-110 z-10"></div>
                                                                                                    
                                                                                                    <div class="bg-white dark:bg-[#0e131f] border border-gray-100 dark:border-blue-500/10 rounded-[20px] shadow-sm overflow-hidden global-transition hover:border-gray-200 dark:hover:border-white/10">
                                                                                                        <div onClick={() => toggleBlock(masterBlock)} class="flex justify-between items-center p-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-white/[0.01] select-none h-[54px]">
                                                                                                            <div class="flex items-center gap-3">
                                                                                                                <div class="w-9 h-9 rounded-lg bg-blue-600/10 flex items-center justify-center text-blue-600"><i class={`ph ${isExpanded ? 'ph-folder-open' : 'ph-folder'} text-lg`}></i></div>
                                                                                                                <h2 class="font-display text-base font-bold text-gray-900 dark:text-white tracking-tight">{masterBlock}</h2>
                                                                                                            </div>
                                                                                                            <div class="flex items-center gap-2">
                                                                                                                <span class="text-[10px] font-mono font-bold px-2 py-0.5 rounded-full bg-gray-100 dark:bg-white/5 text-gray-500 dark:text-gray-400">{totalFilesCount} {totalFilesCount === 1 ? 'file' : 'files'}</span>
                                                                                                                <i class={`ph ph-caret-down text-gray-400 text-base global-transition ${isExpanded ? 'rotate-180' : ''}`}></i>
                                                                                                            </div>
                                                                                                        </div>
                                                                                                        
                                                                                                        {/* ACCORDION SLIDE CONTENT CONTAINER */}
                                                                                                        <div class={`accordion-content overflow-hidden transition-all duration-300 ease-in-out ${isExpanded ? 'max-h-[5000px] opacity-100 border-t border-gray-100 dark:border-white/5' : 'max-h-0 opacity-0'}`}>
                                                                                                            <div class="p-4 pt-4 space-y-6 bg-gray-50/50 dark:bg-black/20">
                                                                                                                {Object.keys(activeSubjectMasterBlocks[masterBlock]).sort().map(subBlock => (
                                                                                                                    <div key={subBlock} class="space-y-3">
                                                                                                                        {subBlock !== masterBlock && (
                                                                                                                            <h3 class="text-[10px] font-black uppercase tracking-widest text-blue-600 flex items-center gap-2 pl-1">
                                                                                                                                <span class="w-1.5 h-1.5 rounded-full bg-blue-600 animate-pulse"></span>
                                                                                                                                {subBlock}
                                                                                                                            </h3>
                                                                                                                        )}
                                                                                                                        <div class="flex flex-col gap-2.5">
                                                                                                                            {activeSubjectMasterBlocks[masterBlock][subBlock].map((item, idx) => {
                                                                                                                                const routes = resolveDriveLinks(item.file_link);
                                                                                                                                return isSingleRedirect ? (
                                                                                                                                    <div key={idx} class="group/row flex flex-col md:flex-row md:items-center justify-between p-3.5 rounded-[16px] bg-white dark:bg-[#16171d] border border-gray-100 dark:border-white/5 hover:border-blue-600/30 hover:translate-x-1 border-l-2 hover:border-l-blue-500 global-transition shadow-sm gap-3">
                                                                                                                                        <div class="flex items-start gap-3 w-full md:w-[75%]">
                                                                                                                                            <div class="w-9 h-9 rounded-lg bg-blue-600/10 flex items-center justify-center text-blue-600 shrink-0 mt-0.5"><i class="ph ph-terminal-window text-lg"></i></div>
                                                                                                                                            <div class="flex items-center gap-2 flex-wrap pt-1.5"><span class="text-sm text-gray-900 dark:text-white font-bold whitespace-normal break-words leading-tight">{item.topic}</span>{renderFileBadge(item.resource_type, item.topic)}</div>
                                                                                                                                        </div>
                                                                                                                                        <a href={item.file_link} target="_blank" class="w-full md:w-auto bg-[#d3ee7a] text-black rounded-xl px-4 py-2 flex items-center justify-center gap-2 hover:opacity-90 font-bold shrink-0 shadow-sm global-transition text-xs h-9"><span>Open Link</span><i class="ph ph-arrow-right text-xs font-bold"></i></a>
                                                                                                                                    </div>
                                                                                                                                ) : (
                                                                                                                                    <div key={idx} class="group/row flex flex-col md:flex-row md:items-center justify-between p-3.5 rounded-[16px] bg-white dark:bg-[#16171d] border border-gray-100 dark:border-white/5 hover:border-gray-300 dark:hover:border-white/20 hover:translate-x-1 border-l-2 border-l-transparent hover:border-l-blue-500 global-transition shadow-sm gap-3">
                                                                                                                                        <div class="flex items-start gap-3 w-full md:w-[75%]">
                                                                                                                                            <div class="w-9 h-9 rounded-lg bg-gray-50 dark:bg-white/5 flex items-center justify-center text-gray-400 dark:text-gray-500 shrink-0 mt-0.5 border border-gray-100 dark:border-white/5"><i class="ph ph-file-text text-lg"></i></div>
                                                                                                                                            <div class="flex items-center gap-2 flex-wrap pt-1.5"><span class="text-sm text-gray-900 dark:text-white font-bold whitespace-normal break-words leading-tight">{item.topic}</span>{renderFileBadge(item.resource_type, item.topic)}</div>
                                                                                                                                        </div>
                                                                                                                                        <div class="flex items-center gap-2 w-full md:w-auto shrink-0 justify-end bg-gray-100/50 dark:bg-white/5 p-1 rounded-xl md:bg-transparent md:dark:bg-transparent">
                                                                                                                                            <a href={routes.preview} target="_blank" title="Preview Document" class="flex-1 md:flex-none w-auto md:w-9 h-9 rounded-lg bg-white dark:bg-white/5 border border-gray-200 dark:border-white/5 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-blue-600/20 hover:text-blue-600 dark:hover:bg-blue-600/20 dark:hover:text-blue-400 global-transition shadow-sm md:shadow-none"><i class="ph ph-eye text-base"></i></a>
                                                                                                                                            <button onClick={() => { triggerSystemToastAlert(item.topic); window.open(routes.download, '_blank'); }} title="Download File" class="flex-1 md:flex-none w-auto md:w-9 h-9 rounded-lg bg-white dark:bg-white/5 border border-gray-200 dark:border-white/5 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-emerald-500/20 hover:text-emerald-500 dark:hover:bg-emerald-500/20 dark:hover:text-emerald-400 global-transition shadow-sm md:shadow-none"><i class="ph ph-download text-base"></i></button>
                                                                                                                                        </div>
                                                                                                                                    </div>
                                                                                                                                );
                                                                                                                            })}
                                                                                                                        </div>
                                                                                                                    </div>
                                                                                                                ))}
                                                                                                            </div>
                                                                                                        </div>
                                                                                                    </div>
                                                                                                </div>
                                                                                            );
                                                                                        })}
                                                                                    </React.Fragment>
                                                                                );
                                                                            })()}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            {/* MODULE 4: BATCH CONNECTION FOLDERS */}
                                            {currentTab === "folders" && (
                                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left max-w-4xl mx-auto animate-fade-in">
                                                    {batchFolders.length === 0 ? <div class="col-span-full text-center text-sm text-gray-500 italic py-8">No shared connection folders.</div> : batchFolders.filter(f => f.batch === selectedBatch && f.semester === selectedSemester).map((f, idx) => (
                                                        <a key={idx} href={f.folder_link} target="_blank" class="p-6 bg-white dark:bg-[#0e131f] border border-gray-100 dark:border-blue-500/10 shadow-sm rounded-[32px] flex items-center justify-between group flex-row hover:-translate-y-1 hover:shadow-md hover:border-blue-600/30 global-transition">
                                                            <div class="space-y-2 max-w-[85%]">
                                                                <div class="flex items-center gap-2 text-[10px] font-bold tracking-widest uppercase text-gray-400"><span>{f.batch}</span><span>•</span><span>{f.semester}</span><span>•</span><span class="text-blue-600">{f.category}</span></div>
                                                                <h4 class="text-lg font-bold text-gray-900 dark:text-white whitespace-normal break-words leading-tight group-hover:text-blue-600 transition-colors">{f.topic}</h4>
                                                                <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">{f.subject}</p>
                                                            </div>
                                                            <i class="ph ph-folder-open text-gray-300 dark:text-gray-600 group-hover:text-blue-600 text-3xl transition-colors shrink-0"></i>
                                                        </a>
                                                    ))}
                                                </div>
                                            )}

                                            {/* MODULE 5: SCHOOL CALENDARS */}
                                            {currentTab === "calendar" && (
                                                <div class="space-y-4 text-left h-full flex flex-col max-w-5xl mx-auto animate-fade-in">
                                                    <div class="bg-white dark:bg-[#0e131f] border border-gray-100 dark:border-blue-500/10 p-2 rounded-[32px] h-[65vh] min-h-[450px] flex-1 shadow-sm">
                                                        <iframe src={configMap.calendar_embed_url || "https://calendar.google.com/calendar/embed?src=en.philippines%23holiday%40group.v.calendar.google.com"} style={{border: 0, borderRadius: "20px"}} class="w-full h-full dark:opacity-75 dark:invert dark:contrast-125" frameborder="0" scrolling="no"></iframe>
                                                    </div>
                                                </div>
                                            )}
                                        </React.Fragment>
                                    )}
                                </div>
                            </main>

                            {}
                            {/* MOBILE NAVIGATION BAR COMPACT */}
                            <nav class="md:hidden fixed bottom-0 left-0 w-full h-16 bg-white/90 dark:bg-[#0c0d12]/90 backdrop-blur-md border-t border-gray-100 dark:border-white/5 z-50 px-4 flex items-center gap-6 overflow-x-auto no-scrollbar shadow-lg">
                                {[
                                    { id: "dashboard", icon: "ph-terminal-window", label: "Overview" },
                                    { id: "books", icon: "ph-books", label: "Books" },
                                    { id: "Note", icon: "ph-file-text", label: "Notes" },
                                    { id: "Sud_An", icon: "ph-notebook", label: "Recalls" },
                                    { id: "Fresh_Sud_An", icon: "ph-newspaper", label: "New" },
                                    { id: "Questionnaire", icon: "ph-brain", label: "Quizzes" },
                                    { id: "folders", icon: "ph-folder-user", label: "Archives" },
                                    { id: "calendar", icon: "ph-calendar-blank", label: "Calendar" }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => { setCurrentTab(tab.id); setIsAdminMode(false); }} class={`flex flex-col items-center justify-center shrink-0 min-w-[48px] h-full transition-all duration-200 ${currentTab === tab.id && !isAdminMode ? "text-blue-600 dark:text-[#b4c5ff] font-bold scale-105" : "text-gray-400 dark:text-gray-500"}`}>
                                        <i class={`ph ${tab.icon} text-[20px] mb-0.5`}></i>
                                        <span class="text-[9px] tracking-tight">{tab.label}</span>
                                    </button>
                                ))}
                                {isUserAdminOfficer && (
                                    <button onClick={() => setIsAdminMode(!isAdminMode)} class={`flex flex-col items-center justify-center shrink-0 min-w-[48px] h-full transition-all duration-200 ${isAdminMode ? "text-amber-500 font-bold scale-105" : "text-gray-400 dark:text-gray-500"}`}>
                                        <i class="ph ph-key text-[20px] mb-0.5"></i>
                                        <span class="text-[9px] tracking-tight">Admin</span>
                                    </button>
                                )}
                                <div class="h-6 w-[1px] bg-gray-200 dark:bg-white/10 shrink-0"></div>
                                <button onClick={() => setIsDark(!isDark)} class="flex flex-col items-center justify-center shrink-0 min-w-[48px] h-full text-gray-400 dark:text-gray-500 transition-all active:scale-95">
                                    <i class={`ph ${isDark ? 'ph-sun' : 'ph-moon'} text-[20px] mb-0.5`}></i>
                                    <span class="text-[9px] tracking-tight">Theme</span>
                                </button>
                            </nav>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
